<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Thumbnail Generator — Shitty Holodeck</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  .subtitle { color: #8494a7; margin-bottom: 24px; font-size: 14px; }
  button { background: #00D9D9; color: #1a2332; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: #00B8B8; }
  button:disabled { opacity: 0.4; cursor: default; }
  #log { background: #0d0d1a; border-radius: 8px; padding: 16px; margin-top: 16px; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
  #preview-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 16px; }
  #preview-grid img { width: 64px; height: 64px; border-radius: 4px; border: 1px solid #333; }
  .controls { display: flex; gap: 12px; align-items: center; }
  .progress { color: #00D9D9; font-weight: 600; margin-left: 12px; }
</style>
</head>
<body>

<h1>Thumbnail Generator</h1>
<p class="subtitle">
  Generates 128x128 JPEG thumbnails for all stock assets. Opens each asset type's
  manifest, renders simplified 3D previews, and packages them into a ZIP for download.
  Unzip into <code>public/holodeck/thumbnails/</code>.
</p>

<div class="controls">
  <button id="btn-generate" onclick="runGenerator()">Generate All Thumbnails</button>
  <button id="btn-download" onclick="downloadZip()" disabled>Download ZIP</button>
  <span id="progress" class="progress"></span>
</div>

<div id="log"></div>
<div id="preview-grid"></div>

<!-- Three.js from CDN (same version used by the app via importmap) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r162/three.min.js"></script>
<!-- JSZip for packaging -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ── Config ──────────────────────────────────────────────────
const THUMB_SIZE = 128;
const JPEG_QUALITY = 0.7;
const BASE = '../global_assets';

// Asset type folders and their manifest locations
const ASSET_FOLDERS = [
  { folder: 'characters', type: 'character' },
  { folder: 'objects',    type: 'prop' },
  { folder: 'environments', type: 'environment' },
  { folder: 'voices',    type: 'voice' },
  { folder: 'music',     type: 'music' },
];

// Character config (mirrors shared/charConfig.js)
const CHARACTER = { floatHeight: 0.15 };
const HEAD = { neckGap: 0.02 };
const DEFAULT_COLORS = { scalp: '#8b2020', skin: '#ffcc88', torso: '#7b4daa', bottom: '#3a2870' };

const BODY_HEIGHT_PRESETS = {
  squat: { height: 0.50 }, medium: { height: 0.72 }, tall: { height: 0.95 },
};
const BODY_WIDTH_PRESETS = {
  narrow: { width: 0.476 }, moderate: { width: 0.652 }, wide: { width: 0.85 },
};
const HEAD_HEIGHT_PRESETS = {
  squat: { height: 0.44 }, medium: { height: 0.58 }, tall: { height: 0.72 },
};
const HEAD_WIDTH_PRESETS = {
  narrow: { width: 0.40 }, moderate: { width: 0.55 }, wide: { width: 0.72 },
};
const FACE_FEATURES = {
  eye: { scleraDiameter: 0.138, xOffsetByWidth: { narrow: 0.078, moderate: 0.120, wide: 0.161 } },
};

// Scene colors (mirrors shared/palette.js)
const SCENE_BG = 0x1A1A2E;
const GROUND_COLOR = 0x3a3a5e;

// ── State ───────────────────────────────────────────────────
let zip = null;
let renderer = null;
let totalGenerated = 0;

// ── Logging ─────────────────────────────────────────────────
const logEl = document.getElementById('log');
const progressEl = document.getElementById('progress');
const gridEl = document.getElementById('preview-grid');

function log(msg) {
  logEl.textContent += msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

function updateProgress(current, total) {
  progressEl.textContent = `${current} / ${total}`;
}

// ── Renderer (single instance) ──────────────────────────────
function ensureRenderer() {
  if (renderer) return renderer;
  const canvas = document.createElement('canvas');
  canvas.width = THUMB_SIZE;
  canvas.height = THUMB_SIZE;
  renderer = new THREE.WebGLRenderer({ canvas, antialias: false, preserveDrawingBuffer: true });
  renderer.setSize(THUMB_SIZE, THUMB_SIZE);
  return renderer;
}

// ── Scene builder ───────────────────────────────────────────
function buildScene() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(SCENE_BG);
  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);

  // Simple lighting for MeshStandardMaterial
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const key = new THREE.DirectionalLight(0xffffff, 1.0);
  key.position.set(3, 5, 4);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-3, 2, -2);
  scene.add(fill);

  // Ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 10),
    new THREE.MeshStandardMaterial({ color: GROUND_COLOR, roughness: 1.0 })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  return { scene, camera };
}

// ── Character builder ───────────────────────────────────────
function buildCharacter(scene, camera, asset) {
  const s = asset.payload?.state || {};
  const group = new THREE.Group();

  const bodyH = (BODY_HEIGHT_PRESETS[s.heightPreset] || BODY_HEIGHT_PRESETS.medium).height;
  const bodyW = (BODY_WIDTH_PRESETS[s.widthPreset] || BODY_WIDTH_PRESETS.moderate).width;
  const floatY = CHARACTER.floatHeight;
  const neckGap = HEAD.neckGap;

  // Body
  const torsoColor = s.torsoColor || DEFAULT_COLORS.torso;
  const bottomColor = s.bottomColor || DEFAULT_COLORS.bottom;
  const bodyGeo = new THREE.CylinderGeometry(bodyW / 2, bodyW / 2, bodyH, 16);
  const body = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color: torsoColor, roughness: 0.7 }));
  body.position.y = floatY + bodyH / 2;
  group.add(body);

  // Head
  const headH = (HEAD_HEIGHT_PRESETS[s.headHeightPreset] || HEAD_HEIGHT_PRESETS.medium).height;
  const headW = (HEAD_WIDTH_PRESETS[s.headWidthPreset] || HEAD_WIDTH_PRESETS.moderate).width;
  const maxDim = Math.max(headW, headH);
  const headGeo = new THREE.SphereGeometry(maxDim / 2, 16, 12);
  headGeo.scale(headW / maxDim, headH / maxDim, headW / maxDim);
  const skinColor = s.skinColor || DEFAULT_COLORS.skin;
  const scalpColor = s.scalpColor || DEFAULT_COLORS.scalp;

  // Two-tone head: bottom half skin, top half scalp
  // Use a simple approach: two half-spheres
  const head = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.7 }));
  const headY = floatY + bodyH + neckGap + headH / 2;
  head.position.y = headY;
  group.add(head);

  // Scalp cap (top portion of head)
  const scalpGeo = new THREE.SphereGeometry(maxDim / 2 * 1.002, 16, 8, 0, Math.PI * 2, 0, Math.PI * 0.35);
  scalpGeo.scale(headW / maxDim, headH / maxDim, headW / maxDim);
  const scalp = new THREE.Mesh(scalpGeo, new THREE.MeshStandardMaterial({ color: scalpColor, roughness: 0.7 }));
  scalp.position.y = headY;
  group.add(scalp);

  // Eyes
  const eyeSize = FACE_FEATURES.eye.scleraDiameter * 0.5;
  const fwPreset = s.faceWidthPreset || 'moderate';
  const eyeX = FACE_FEATURES.eye.xOffsetByWidth[fwPreset] || 0.12;
  const faceZ = headW * 0.45;
  const eyeY = headY + headH * 0.05;

  for (const xSign of [-1, 1]) {
    const eye = new THREE.Mesh(
      new THREE.SphereGeometry(eyeSize, 8, 8),
      new THREE.MeshBasicMaterial({ color: '#ffffff' })
    );
    eye.position.set(xSign * eyeX, eyeY, faceZ);
    group.add(eye);

    const pupil = new THREE.Mesh(
      new THREE.SphereGeometry(eyeSize * 0.5, 8, 8),
      new THREE.MeshBasicMaterial({ color: s.eyeIrisColor || '#4a7a8c' })
    );
    pupil.position.set(xSign * eyeX, eyeY, faceZ + eyeSize * 0.6);
    group.add(pupil);
  }

  scene.add(group);

  const charHeight = floatY + bodyH + neckGap + headH;
  camera.position.set(0.4, charHeight * 0.55, 1.5);
  camera.lookAt(0, charHeight * 0.45, 0);
}

// ── Prop builder ────────────────────────────────────────────
function buildProp(scene, camera, asset) {
  const payload = asset.payload || {};
  const elements = payload._editor?.elements || [];
  const colorMap = payload._editor?.color_assignments || payload.color_assignments || {};
  const group = new THREE.Group();

  const PRIM = {
    box(p) { return new THREE.BoxGeometry(p.width||p.sx||1, p.height||p.sy||1, p.depth||p.sz||1); },
    sphere(p) { return new THREE.SphereGeometry(p.radius||0.5, 12, 8); },
    cylinder(p) { return new THREE.CylinderGeometry(p.radiusTop??p.radius??0.5, p.radiusBottom??p.radius??0.5, p.height||1, 12); },
    cone(p) { const g = new THREE.ConeGeometry(p.radius||0.5, p.height||1, 12); g.rotateX(Math.PI); return g; },
    torus(p) { const g = new THREE.TorusGeometry(p.radius||0.5, p.tubeRadius||p.tube||0.15, 8, 16); g.rotateX(Math.PI/2); return g; },
    capsule(p) { return new THREE.CapsuleGeometry?.(p.radius||0.3, p.length||1, 4, 8) || new THREE.SphereGeometry(p.radius||0.3, 8, 8); },
  };

  for (const el of elements) {
    const factory = PRIM[el.primitiveId || el.primitive];
    if (!factory) continue;
    const p = el.params || {};
    const geo = factory(p);
    let fill = p.fill || 'primary';
    let color = '#888888';
    if (fill === 'primary') color = payload.primaryColor || '#888888';
    else if (colorMap[fill]) color = colorMap[fill];
    else if (typeof fill === 'string' && fill.startsWith('#')) color = fill;
    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, roughness: 0.7 }));
    mesh.position.set(p.px||0, p.py||0, p.pz||0);
    const d = Math.PI / 180;
    mesh.rotation.set((p.rx||0)*d, (p.ry||0)*d, (p.rz||0)*d);
    group.add(mesh);
  }

  scene.add(group);
  camera.position.set(0.5, 0.8, 1.8);
  camera.lookAt(0, 0.4, 0);
}

// ── Environment builder ─────────────────────────────────────
function buildEnvironment(scene, camera, asset) {
  const payload = asset.payload || {};
  const st = payload.state || {};
  const skyColor = st.skyColor || payload.skyColor || '#87CEEB';
  const groundColor = st.groundColor || payload.groundColor || '#4a7a4a';

  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(5, 16, 12),
    new THREE.MeshBasicMaterial({ color: skyColor, side: THREE.BackSide })
  ));

  const gMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 10),
    new THREE.MeshStandardMaterial({ color: groundColor, roughness: 0.9 })
  );
  gMesh.rotation.x = -Math.PI / 2;
  gMesh.position.y = 0.01;
  scene.add(gMesh);

  camera.position.set(2, 1.5, 3);
  camera.lookAt(0, 0.3, 0);
}

// ── Fallback builder (voice, music) ─────────────────────────
function buildFallback(scene, camera, asset) {
  const typeColors = { voice: '#7eb8c9', music: '#c97eb8', image: '#b8c97e' };
  const color = typeColors[asset.type] || '#888888';
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 16, 12),
    new THREE.MeshStandardMaterial({ color, roughness: 0.5 })
  );
  mesh.position.y = 0.5;
  scene.add(mesh);
  camera.position.set(0, 0.5, 2);
  camera.lookAt(0, 0.5, 0);
}

// ── Render one thumbnail ────────────────────────────────────
function renderThumbnail(asset) {
  const r = ensureRenderer();
  const { scene, camera } = buildScene();

  const type = asset.type;
  if (type === 'character')                     buildCharacter(scene, camera, asset);
  else if (type === 'prop' || type === 'object') buildProp(scene, camera, asset);
  else if (type === 'environment')              buildEnvironment(scene, camera, asset);
  else                                          buildFallback(scene, camera, asset);

  r.render(scene, camera);
  const dataURL = r.domElement.toDataURL('image/jpeg', JPEG_QUALITY);

  // Dispose scene
  scene.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });

  return dataURL;
}

// ── Load all assets from manifests ──────────────────────────
async function loadAllAssets() {
  const allAssets = [];

  for (const { folder, type } of ASSET_FOLDERS) {
    try {
      const res = await fetch(`${BASE}/${folder}/manifest.json`);
      if (!res.ok) { log(`  Skipping ${folder} (no manifest)`); continue; }
      const manifest = await res.json();

      for (const [catKey, catData] of Object.entries(manifest.categories || {})) {
        for (const filename of (catData.files || [])) {
          try {
            const r = await fetch(`${BASE}/${folder}/${catKey}/${filename}`);
            if (r.ok) {
              const asset = await r.json();
              // Ensure type is set
              if (!asset.type) asset.type = type;
              allAssets.push(asset);
            }
          } catch { /* skip */ }
        }
      }
      log(`  Loaded ${folder}: found assets in ${Object.keys(manifest.categories || {}).length} categories`);
    } catch (e) {
      log(`  Error loading ${folder}: ${e.message}`);
    }
  }

  return allAssets;
}

// ── Main generator ──────────────────────────────────────────
async function runGenerator() {
  const btn = document.getElementById('btn-generate');
  const dlBtn = document.getElementById('btn-download');
  btn.disabled = true;
  dlBtn.disabled = true;
  logEl.textContent = '';
  gridEl.innerHTML = '';
  totalGenerated = 0;

  log('Loading asset manifests...');
  const assets = await loadAllAssets();
  log(`\nTotal assets to process: ${assets.length}\n`);

  zip = new JSZip();
  const thumbFolder = zip.folder('thumbnails');

  for (let i = 0; i < assets.length; i++) {
    const asset = assets[i];
    const id = asset.id || `unknown_${i}`;
    try {
      const dataURL = renderThumbnail(asset);
      const byteLen = dataURL.length;

      // Convert dataURL to binary for ZIP
      const base64 = dataURL.split(',')[1];
      thumbFolder.file(`${id}.jpg`, base64, { base64: true });

      // Show preview
      const img = document.createElement('img');
      img.src = dataURL;
      img.title = `${id} (${asset.type})`;
      gridEl.appendChild(img);

      totalGenerated++;
      if (i < 5 || i % 20 === 0) {
        log(`  [${i+1}/${assets.length}] ${id} (${asset.type}): ${byteLen} bytes`);
      }
    } catch (e) {
      log(`  [${i+1}/${assets.length}] ${id} FAILED: ${e.message}`);
    }

    updateProgress(i + 1, assets.length);

    // Yield to browser every 5 items
    if (i % 5 === 0) await new Promise(r => setTimeout(r, 10));
  }

  log(`\nDone! Generated ${totalGenerated} thumbnails.`);
  log('Click "Download ZIP" to save, then unzip into public/holodeck/thumbnails/');

  // Cleanup renderer
  if (renderer) { renderer.dispose(); renderer = null; }

  btn.disabled = false;
  dlBtn.disabled = false;
}

// ── Download ZIP ────────────────────────────────────────────
async function downloadZip() {
  if (!zip) return;
  log('\nGenerating ZIP file...');
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'holodeck-thumbnails.zip';
  a.click();
  URL.revokeObjectURL(url);
  log('ZIP download started!');
}
</script>
</body>
</html>

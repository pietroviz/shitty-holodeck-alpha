<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageBox — Simbox Asset Builder</title>
<style>
/* ───────────────────────────────────────────────
   RESET & BASE
─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

:root {
  --app-panel-bg: #0d1b2e;
  --app-stage-bg: #484848;
  --app-panel-width: 400px;
  --app-panel-bottom-h: 260px;
  --app-accent: #00c4be;
  --app-accent-hover: #00a8a3;
  --app-text: #ffffff;
  --app-text-muted: #8a9ab8;
  --app-border: rgba(255,255,255,0.08);
  --app-surface: rgba(255,255,255,0.06);
  --app-surface-hover: rgba(255,255,255,0.10);
  --app-input-bg: #ffffff;
  --app-radius: 12px;
  --app-radius-sm: 8px;
}

/* ───────────────────────────────────────────────
   LAYOUT
─────────────────────────────────────────────── */
#app {
  display: flex;
  width: 100vw;
  height: 100vh;
}

/* PANEL — left on desktop */
#panel {
  width: var(--app-panel-width);
  min-width: var(--app-panel-width);
  background: var(--app-panel-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
  border-right: 1px solid var(--app-border);
  position: relative;
}

/* STAGE — fills remaining space */
#stage {
  flex: 1;
  background: var(--app-stage-bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ───────────────────────────────────────────────
   PANEL HEADER
─────────────────────────────────────────────── */
#panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--app-border);
}

#btn-cancel {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 20px;
  color: var(--app-text-muted);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.12s;
}
#btn-cancel:hover { background: var(--app-surface-hover); color: var(--app-text); }

#panel-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--app-text);
  letter-spacing: -0.01em;
  flex: 1;
  text-align: center;
}

#btn-done {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--app-accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.12s;
}
#btn-done:hover { background: var(--app-accent-hover); }

/* ───────────────────────────────────────────────
   PANEL TABS
─────────────────────────────────────────────── */
#panel-tabs {
  display: flex;
  padding: 0 8px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--app-border);
}

.panel-tab {
  flex: 1;
  padding: 10px 6px;
  background: none;
  border: none;
  color: var(--app-text-muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: color 0.15s, border-bottom 0.15s;
  border-bottom: 2px solid transparent;
  text-align: center;
}
.panel-tab:hover { color: var(--app-text); }
.panel-tab.active { color: var(--app-accent); border-bottom-color: var(--app-accent); }

/* File tab active gets a subtle pill background */
.panel-tab[data-tab="file"].active {
  background: rgba(255,255,255,0.05);
  border-radius: 6px 6px 0 0;
}

#panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  position: relative;
}
#panel-body::-webkit-scrollbar { width: 4px; }
#panel-body::-webkit-scrollbar-track { background: transparent; }
#panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.tab-section { display: none; }
.tab-section.active { display: block; }

/* ───────────────────────────────────────────────
   PROPERTIES OVERLAY (not a tab — slides over)
─────────────────────────────────────────────── */
#props-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: var(--app-panel-bg);
  z-index: 20;
  overflow-y: auto;
  padding: 16px;
}
#props-overlay.open { display: block; }
#props-overlay::-webkit-scrollbar { width: 4px; }
#props-overlay::-webkit-scrollbar-track { background: transparent; }
#props-overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

#props-close-btn {
  display: none; /* Replaced by #btn-props-back in panel header */
}
#props-close-btn:hover { opacity: 0.7; }

/* ───────────────────────────────────────────────
   FILE TAB
─────────────────────────────────────────────── */
.file-field { margin-bottom: 14px; }

.file-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--app-text-muted);
  margin-bottom: 5px;
}

.file-input, .file-textarea, .file-select {
  width: 100%;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 8px;
  color: var(--app-text);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.12s;
}
.file-input:focus, .file-textarea:focus, .file-select:focus { border-color: var(--app-accent); }
.file-textarea { resize: vertical; min-height: 60px; }
.file-select option { background: #1e2d3d; }

.file-char-count {
  font-size: 9px;
  color: var(--app-text-muted);
  text-align: right;
  margin-top: 3px;
}
.file-char-count.over { color: #ff6b6b; }

/* ───────────────────────────────────────────────
   FRAME TAB
─────────────────────────────────────────────── */
.frame-presets {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.frame-preset-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 8px;
  background: var(--app-surface);
  border: 2px solid var(--app-border);
  border-radius: 10px;
  color: var(--app-text-muted);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.frame-preset-btn:hover { background: var(--app-surface-hover); color: var(--app-text); }
.frame-preset-btn.active { border-color: var(--app-accent); color: var(--app-accent); background: rgba(0,196,190,0.08); }

.frame-icon {
  border: 1.5px solid currentColor;
  border-radius: 2px;
}

/* Background colour row */
.bg-color-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
  border: 1px solid var(--app-border);
  margin-bottom: 8px;
}
.bg-color-row:hover { background: var(--app-surface); }
.bg-color-row.editing { background: var(--app-surface-hover); border-color: var(--app-accent); }

.bg-swatch {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.15);
}

.bg-swatch.transparent-swatch {
  background-image:
    linear-gradient(45deg, #666 25%, transparent 25%),
    linear-gradient(-45deg, #666 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #666 75%),
    linear-gradient(-45deg, transparent 75%, #666 75%);
  background-size: 8px 8px;
  background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
  background-color: #555;
}

/* Anchor point section */
.anchor-info {
  font-size: 11px;
  color: var(--app-text-muted);
  line-height: 1.5;
  padding: 8px 0;
}

.anchor-coords {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.anchor-coord-field {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.anchor-coord-label {
  font-size: 11px;
  color: var(--app-text-muted);
  font-weight: 600;
}

.anchor-coord-input {
  flex: 1;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 6px;
  color: var(--app-text);
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
  transition: border-color 0.12s;
  width: 60px;
}
.anchor-coord-input:focus { border-color: var(--app-accent); }

/* Section headings inside panel */
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--app-text-muted);
  margin-bottom: 10px;
  margin-top: 16px;
}
.section-label:first-child { margin-top: 0; }

/* ───────────────────────────────────────────────
   SHAPES GRID
─────────────────────────────────────────────── */
.category-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--app-text-muted);
  margin: 14px 0 6px;
}
.category-label:first-child { margin-top: 0; }

.shapes-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.shape-btn {
  aspect-ratio: 1;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: var(--app-radius-sm);
  color: var(--app-text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  transition: background 0.12s, border-color 0.12s;
  padding: 6px 2px 4px;
}
.shape-btn:hover { background: var(--app-surface-hover); border-color: rgba(255,255,255,0.2); }
.shape-btn .shape-name { font-size: 8px; color: var(--app-text-muted); font-weight: 500; line-height: 1; }

/* ───────────────────────────────────────────────
   COLORS TAB
─────────────────────────────────────────────── */

/* Color role assignment rows */
.color-role-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 6px;
  border-bottom: 1px solid var(--app-border);
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.12s;
  position: relative;
}
.color-role-row:hover { background: var(--app-surface); }
.color-role-row.editing { background: var(--app-surface-hover); outline: 1px solid var(--app-accent); }

.role-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.2);
}

.role-label {
  font-size: 12px;
  color: var(--app-text);
  font-weight: 600;
  flex: 1;
  text-transform: capitalize;
}

.role-hex {
  font-size: 10px;
  color: var(--app-text-muted);
  font-family: monospace;
}

/* DB32 color picker popup — flows inline under the active role row */
.db32-popup {
  background: rgba(0,196,190,0.06);
  border: 1px solid var(--app-accent);
  border-radius: 10px;
  padding: 8px;
  margin: 4px 0 8px;
}

.db32-popup-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 3px;
}

.db32-swatch {
  aspect-ratio: 1;
  border-radius: 4px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.1s, transform 0.1s;
}
.db32-swatch:hover { border-color: rgba(255,255,255,0.5); transform: scale(1.15); }
.db32-swatch.active { border-color: #fff; transform: scale(1.15); }

/* Randomize button */
#btn-randomize {
  width: 100%;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 8px;
  color: var(--app-text);
  font-size: 12px;
  font-weight: 600;
  padding: 10px;
  cursor: pointer;
  transition: all 0.12s;
  margin-top: 12px;
  margin-bottom: 16px;
}
#btn-randomize:hover { background: var(--app-surface-hover); border-color: var(--app-accent); color: var(--app-accent); }

/* Mini palette quick picks */
.mini-palette-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
  border: 1px solid transparent;
}
.mini-palette-row:hover { background: var(--app-surface-hover); border-color: var(--app-border); }

.mini-swatch {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
}
.mini-swatch.primary-swatch { flex: 3; }
.mini-swatch.secondary-swatch { flex: 2; }
.mini-swatch.tertiary-swatch { flex: 1; }

.mini-palette-name {
  font-size: 10px;
  color: var(--app-text-muted);
  margin-left: 6px;
  flex-shrink: 0;
}

/* ───────────────────────────────────────────────
   PROPERTIES TAB
─────────────────────────────────────────────── */
.prop-empty {
  text-align: center;
  color: var(--app-text-muted);
  font-size: 12px;
  padding: 32px 0;
  line-height: 1.7;
}

.prop-group { margin-bottom: 16px; }

.prop-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.prop-label {
  font-size: 11px;
  color: var(--app-text-muted);
  flex-shrink: 0;
  width: 90px;
}

.prop-input {
  flex: 1;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 6px;
  color: var(--app-text);
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
  transition: border-color 0.12s;
}
.prop-input:focus { border-color: var(--app-accent); }

.prop-range {
  flex: 1;
  accent-color: var(--app-accent);
}

.prop-token-select {
  flex: 1;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 6px;
  color: var(--app-text);
  font-size: 11px;
  padding: 5px 8px;
  cursor: pointer;
  outline: none;
}
.prop-token-select option { background: #1e2d3d; }

.layer-controls {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}

.layer-btn {
  flex: 1;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 6px;
  color: var(--app-text-muted);
  font-size: 11px;
  padding: 6px;
  cursor: pointer;
  transition: all 0.12s;
}
.layer-btn:hover { background: var(--app-surface-hover); color: var(--app-text); }

.delete-btn {
  width: 100%;
  background: rgba(220, 60, 60, 0.1);
  border: 1px solid rgba(220, 60, 60, 0.3);
  border-radius: 8px;
  color: #ff6b6b;
  font-size: 12px;
  font-weight: 600;
  padding: 8px;
  cursor: pointer;
  transition: all 0.12s;
  margin-top: 8px;
}
.delete-btn:hover { background: rgba(220, 60, 60, 0.2); }

/* ───────────────────────────────────────────────
   STAGE CONTENTS
─────────────────────────────────────────────── */
#menu-btn {
  position: absolute;
  top: 16px;
  left: 16px;
  width: 44px;
  height: 44px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  backdrop-filter: blur(8px);
  transition: background 0.12s;
}
#menu-btn:hover { background: rgba(0,0,0,0.55); }

/* Canvas wrapper — centers the SVG in the stage */
#canvas-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 40px 20px;
  overflow: hidden;
  position: relative;
}

#svg-canvas {
  max-width: 100%;
  max-height: 100%;
  /* Checkerboard for transparency */
  background-image:
    linear-gradient(45deg, #666 25%, transparent 25%),
    linear-gradient(-45deg, #666 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #666 75%),
    linear-gradient(-45deg, transparent 75%, #666 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
  background-color: #555;
  border-radius: 4px;
  cursor: crosshair;
  user-select: none;
  touch-action: none;
}

/* Selection ring drawn via SVG overlay */
.el-selection { pointer-events: none; }

/* Item name row */
#item-name-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  flex-shrink: 0;
}

#item-color-badge {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--app-accent);
  flex-shrink: 0;
}

#item-name-display {
  font-size: 16px;
  font-weight: 600;
  color: var(--app-text);
  cursor: pointer;
  flex: 1;
}
#item-name-display:hover { opacity: 0.8; }

#btn-edit-item {
  display: none;
  align-items: center;
  gap: 4px;
  background: var(--app-surface);
  border: 1px solid var(--app-border);
  border-radius: 8px;
  color: var(--app-text-muted);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
}
#btn-edit-item:hover { background: var(--app-surface-hover); color: var(--app-text); border-color: var(--app-accent); }

/* Header action buttons */
#btn-search-toggle, #btn-search-close {
  background: none;
  border: none;
  color: var(--app-text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all 0.12s;
}
#btn-search-toggle:hover, #btn-search-close:hover { color: var(--app-text); background: var(--app-surface-hover); }

#btn-props-back {
  display: none;
  align-items: center;
  gap: 4px;
  background: transparent;
  border: 1px solid var(--app-border);
  border-radius: 8px;
  color: var(--app-text-muted);
  font-size: 12px;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.12s;
}
#btn-props-back:hover { color: var(--app-text); background: var(--app-surface-hover); }

#panel-title-text { font-size: 14px; font-weight: 700; }

/* Prompt bar */
#prompt-bar {
  padding: 12px 24px 20px;
  flex-shrink: 0;
}

#prompt-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #ffffff;
  border-radius: 14px;
  padding: 10px 10px 10px 18px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  max-width: 720px;
  margin: 0 auto;
}

#prompt-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 14px;
  color: #222;
  background: transparent;
  min-width: 0;
}
#prompt-input::placeholder { color: #aaa; }

#btn-new {
  padding: 8px 14px;
  border: 1.5px solid #d0d0d0;
  border-radius: 8px;
  background: #fff;
  color: #555;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
  flex-shrink: 0;
}
#btn-new:hover { background: #f5f5f5; border-color: #bbb; }

#btn-generate {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--app-accent);
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.12s;
}
#btn-generate:hover { background: var(--app-accent-hover); }
#btn-generate.generating {
  pointer-events: none;
  opacity: 0.7;
  animation: pulse-glow 1s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,196,190,0.3); }
  50% { box-shadow: 0 0 12px 4px rgba(0,196,190,0.5); }
}
#prompt-input.generating {
  pointer-events: none;
  opacity: 0.5;
}

/* ───────────────────────────────────────────────
   MENU DROPDOWN
─────────────────────────────────────────────── */
#menu-dropdown {
  position: absolute;
  top: 68px;
  left: 16px;
  background: #1a2a3a;
  border: 1px solid var(--app-border);
  border-radius: var(--app-radius);
  min-width: 180px;
  z-index: 100;
  overflow: hidden;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#menu-dropdown.open { display: block; }

.menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  color: var(--app-text);
  font-size: 14px;
  cursor: pointer;
  transition: background 0.1s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.menu-item:hover { background: var(--app-surface-hover); }
.menu-item .menu-icon { font-size: 16px; width: 20px; text-align: center; }
.menu-sep { height: 1px; background: var(--app-border); margin: 4px 0; }

/* ───────────────────────────────────────────────
   APP MODES — Browse (default) vs Edit
─────────────────────────────────────────────── */
/* ── STATE: CLOSED ── panel hidden, full-width canvas */
#panel.closed { display: none; }
body.state-closed #menu-btn { display: flex; }
body.state-closed #btn-edit-item { display: flex; }

/* ── STATE: BROWSE ── gallery panel open */

<script type="module">
// ─────────────────────────────────────────────────────────────────
//  IMPORTS
// ─────────────────────────────────────────────────────────────────
import { loadPrimitives, PRIMITIVES, getPrimitive, getPrimitivesByCategory, resolveTokens } from './primitives.js';

// ─────────────────────────────────────────────────────────────────
//  PALETTE — DB32 loaded from assets/palettes/db32.json
// ─────────────────────────────────────────────────────────────────
let DB32 = null;  // { id, name, colors: [{ index, name, hex }] }

// The 3 color roles for the current asset, each pointing at a DB32 hex
const COLOR_ROLES = ['primary', 'secondary', 'tertiary'];
let colorAssignments = {
  primary:   '#3a7bd5',
  secondary: '#df7126',
  tertiary:  '#1a3a6e',
};

// Background colour — null means transparent
let bgColor = null;
let openBgPicker = false;

let openPickerRole = null;  // which role has its popup open

// Curated mini palettes — each is a set of 3 DB32 color indices
const MINI_PALETTES = [
  { name: 'Ocean',     primary: 16, secondary: 19, tertiary: 1  },
  { name: 'Sunset',    primary: 5,  secondary: 8,  tertiary: 3  },
  { name: 'Forest',    primary: 11, secondary: 10, tertiary: 14 },
  { name: 'Royal',     primary: 17, secondary: 26, tertiary: 1  },
  { name: 'Warm',      primary: 4,  secondary: 6,  tertiary: 25 },
  { name: 'Cool',      primary: 18, secondary: 20, tertiary: 15 },
  { name: 'Berry',     primary: 28, secondary: 29, tertiary: 2  },
  { name: 'Earth',     primary: 3,  secondary: 31, tertiary: 13 },
  { name: 'Neon',      primary: 9,  secondary: 8,  tertiary: 0  },
  { name: 'Storm',     primary: 24, secondary: 16, tertiary: 1  },
  { name: 'Fire',      primary: 27, secondary: 5,  tertiary: 25 },
  { name: 'Pastel',    primary: 20, secondary: 7,  tertiary: 22 },
];

async function loadDB32() {
  try {
    const res = await fetch('./assets/palettes/db32.json');
    DB32 = await res.json();
  } catch {
    // Fallback if file can't load
    DB32 = { id: 'db32', name: 'DB32', colors: [
      { index: 0, name: 'black', hex: '#000000' },
      { index: 21, name: 'white', hex: '#ffffff' },
    ]};
  }
  // Set initial assignments to nice defaults from DB32
  if (DB32.colors.length >= 32) {
    colorAssignments.primary   = DB32.colors[17].hex; // royal-blue
    colorAssignments.secondary = DB32.colors[5].hex;  // tahiti-gold
    colorAssignments.tertiary  = DB32.colors[1].hex;  // valhalla
  }
}

function applyColorsToDOM() {
  const root = document.documentElement;
  for (const role of COLOR_ROLES) {
    root.style.setProperty(`--${role}`, colorAssignments[role]);
  }
  // Update badge color to primary
  document.getElementById('item-color-badge').style.background = colorAssignments.primary;
  // Update background fill
  const bgRect = document.getElementById('bg-color-rect');
  if (bgRect) bgRect.setAttribute('fill', bgColor || 'none');
}

function randomizeColors() {
  if (!DB32) return;
  const colors = DB32.colors;
  // Pick 3 distinct random colors from DB32
  const indices = new Set();
  while (indices.size < 3) {
    indices.add(Math.floor(Math.random() * colors.length));
  }
  const picks = [...indices];
  colorAssignments.primary   = colors[picks[0]].hex;
  colorAssignments.secondary = colors[picks[1]].hex;
  colorAssignments.tertiary  = colors[picks[2]].hex;
  applyColorsToDOM();
  renderColorsPanel();
  renderStage();
}

// ─────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────
// Frame presets — aspect ratios
// Frame presets — all centered within the 512×512 canvas.
// Wide & Portrait share the same dimensions (just rotated).
// Square is a bit smaller so the three feel proportional.
const FRAME_PRESETS = [
  { id: 'wide',      label: 'Wide',      w: 448, h: 252, iconW: 36, iconH: 20 },  // 16:9
  { id: 'landscape', label: 'Landscape', w: 432, h: 324, iconW: 32, iconH: 24 },  // 4:3
  { id: 'square',    label: 'Square',    w: 400, h: 400, iconW: 26, iconH: 26 },  // 1:1
  { id: 'portrait3', label: 'Portrait',  w: 324, h: 432, iconW: 24, iconH: 32 },  // 3:4
  { id: 'tall',      label: 'Tall',      w: 252, h: 448, iconW: 20, iconH: 36 },  // 9:16
];
const FRAME_ALIASES = { portrait: 'tall' };  // Legacy ID migration
// Compute centered viewBox origin from preset dimensions
function frameOrigin(w, h) {
  return { x: Math.round((512 - w) / 2), y: Math.round((512 - h) / 2) };
}

let state = {
  meta: { name: 'Untitled', description: '', tags: [], layer: '' },
  viewBox: { w: 400, h: 400 },
  framePreset: 'square',
  anchor: { x: 256, y: 256 },
  elements: [],          // { id, primitiveId, params, zIndex }
  selectedIds: new Set(), // multi-select support
  _nextId: 1,
  _version: 1,
  _created: new Date().toISOString(),
  _assetId: null,
};

// Convenience helpers for selection
function isSelected(id) { return state.selectedIds.has(id); }
function selectOnly(id) { state.selectedIds.clear(); if (id) state.selectedIds.add(id); }
function selectToggle(id) { state.selectedIds.has(id) ? state.selectedIds.delete(id) : state.selectedIds.add(id); }
function clearSelection() { state.selectedIds.clear(); }

function nextId() { return `el_${state._nextId++}`; }

const MAX_SHAPES = 20;

function stateAddElement(primitiveId, params) {
  if (state.elements.length >= MAX_SHAPES) {
    toast(`Limit reached — max ${MAX_SHAPES} shapes per asset`);
    return null;
  }
  const prim = getPrimitive(primitiveId);
  if (!prim) return null;
  const el = {
    id: nextId(),
    primitiveId,
    params: { ...prim.defaults, ...params },
    zIndex: state.elements.length,
  };
  state.elements.push(el);
  selectOnly(el.id);
  renderStage();
  renderPropsPanel();
  return el;
}

function stateUpdateElement(id, paramUpdates) {
  const el = state.elements.find(e => e.id === id);
  if (!el) return;
  Object.assign(el.params, paramUpdates);
  renderStage();
}

function stateDeleteElement(id) {
  state.elements = state.elements.filter(e => e.id !== id);
  state.selectedIds.delete(id);
  renderStage();
  renderPropsPanel();
}

function stateDeleteSelected() {
  const ids = new Set(state.selectedIds);
  state.elements = state.elements.filter(e => !ids.has(e.id));
  clearSelection();
  renderStage();
  renderPropsPanel();
}

function stateMoveLayer(id, dir) {
  const idx = state.elements.findIndex(e => e.id === id);
  if (idx === -1) return;
  const swapIdx = dir === 'up' ? idx + 1 : idx - 1;
  if (swapIdx < 0 || swapIdx >= state.elements.length) return;
  [state.elements[idx], state.elements[swapIdx]] = [state.elements[swapIdx], state.elements[idx]];
  state.elements.forEach((el, i) => el.zIndex = i);
  renderStage();
}

// ─────────────────────────────────────────────────────────────────
//  STAGE RENDERING
// ─────────────────────────────────────────────────────────────────
const svgCanvas = document.getElementById('svg-canvas');
const elementsLayer = document.getElementById('elements-layer');
const selectionLayer = document.getElementById('selection-layer');

function renderStage() {
  // Clear elements layer
  elementsLayer.innerHTML = '';

  for (const el of state.elements) {
    const prim = getPrimitive(el.primitiveId);
    if (!prim) continue;
    const svgStr = prim.toSVGElement(el.params);

    // Wrap in a group with data-id for interaction
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('data-id', el.id);
    g.setAttribute('class', 'stage-element');
    g.style.cursor = 'move';
    g.innerHTML = svgStr;
    elementsLayer.appendChild(g);
  }

  renderSelection();
}

function renderSelection() {
  selectionLayer.innerHTML = '';
  if (state.selectedIds.size === 0) return;

  for (const selId of state.selectedIds) {
    const g = elementsLayer.querySelector(`[data-id="${selId}"]`);
    if (!g) continue;
    try {
      const bbox = g.getBBox();
      const pad = 8;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', bbox.x - pad);
      rect.setAttribute('y', bbox.y - pad);
      rect.setAttribute('width', bbox.width + pad * 2);
      rect.setAttribute('height', bbox.height + pad * 2);
      rect.setAttribute('fill', 'none');
      rect.setAttribute('stroke', '#00c4be');
      rect.setAttribute('stroke-width', '1.5');
      rect.setAttribute('stroke-dasharray', '5,3');
      rect.setAttribute('rx', '4');
      rect.setAttribute('class', 'el-selection');
      selectionLayer.appendChild(rect);
    } catch {}
  }
}

// Flash animation for newly added shapes
function flashElement(elId) {
  requestAnimationFrame(() => {
    const g = elementsLayer.querySelector(`[data-id="${elId}"]`);
    if (!g) return;
    g.style.transition = 'opacity 0.15s, filter 0.15s';
    g.style.opacity = '0.3';
    g.style.filter = 'brightness(2)';
    setTimeout(() => {
      g.style.opacity = '1';
      g.style.filter = 'none';
      setTimeout(() => {
        g.style.transition = '';
        g.style.filter = '';
      }, 200);
    }, 150);
  });
}

// ─────────────────────────────────────────────────────────────────
//  INTERACTION — select & drag (supports multi-select via Shift)
// ─────────────────────────────────────────────────────────────────
let drag = null; // { startSVGX, startSVGY, starts: Map<id, {cx,cy}> }

function svgPoint(clientX, clientY) {
  const pt = svgCanvas.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  return pt.matrixTransform(svgCanvas.getScreenCTM().inverse());
}

svgCanvas.addEventListener('pointerdown', (e) => {
  // Click on background — deselect all
  if (e.target.closest('.canvas-bg')) {
    clearSelection();
    renderSelection();
    document.getElementById('props-overlay').classList.remove('open');
    if (appMode === 'properties') enterEditMode(state._assetId);
    return;
  }

  const g = e.target.closest('[data-id]');
  if (!g) return;
  const id = g.getAttribute('data-id');

  if (e.shiftKey) {
    // Shift-click: toggle this shape in/out of selection
    selectToggle(id);
  } else {
    // Regular click: if clicking an already-selected shape in a multi-select,
    // keep the group selected (for dragging). Otherwise, select only this one.
    if (!isSelected(id)) {
      selectOnly(id);
    }
  }

  renderSelection();
  renderPropsPanel();

  // Start drag for all selected shapes
  const p = svgPoint(e.clientX, e.clientY);
  const starts = new Map();
  for (const selId of state.selectedIds) {
    const el = state.elements.find(e => e.id === selId);
    if (el) starts.set(selId, { cx: el.params.cx || 256, cy: el.params.cy || 256 });
  }
  drag = { startSVGX: p.x, startSVGY: p.y, starts };
  svgCanvas.setPointerCapture(e.pointerId);
  e.preventDefault();
});

svgCanvas.addEventListener('pointermove', (e) => {
  // Anchor drag (Frame tab)
  if (anchorDrag) {
    const ap = svgPoint(e.clientX, e.clientY);
    const { x: ox, y: oy } = frameOrigin(state.viewBox.w, state.viewBox.h);
    state.anchor.x = Math.round(Math.max(ox, Math.min(ox + state.viewBox.w, ap.x)));
    state.anchor.y = Math.round(Math.max(oy, Math.min(oy + state.viewBox.h, ap.y)));
    updateAnchorVisual();
    document.getElementById('anchor-x').value = state.anchor.x;
    document.getElementById('anchor-y').value = state.anchor.y;
    e.preventDefault();
    return;
  }
  if (!drag) return;
  const p = svgPoint(e.clientX, e.clientY);
  const dx = p.x - drag.startSVGX;
  const dy = p.y - drag.startSVGY;

  // Move all selected shapes
  for (const [id, start] of drag.starts) {
    stateUpdateElement(id, {
      cx: Math.round(start.cx + dx),
      cy: Math.round(start.cy + dy),
    });
  }
  renderPropsPanel();
  e.preventDefault();
});

svgCanvas.addEventListener('pointerup', () => { drag = null; anchorDrag = null; });

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  const isArrow = ['ArrowUp', 'ArrowDown'].includes(e.key);

  // ── Browse mode: arrow up/down steps through gallery ──
  if (appMode === 'browse' && isArrow && galleryDisplayedAssets.length > 0) {
    e.preventDefault();
    const currentIdx = galleryDisplayedAssets.findIndex(a => a.id === activeGalleryAssetId);
    let nextIdx;
    if (e.key === 'ArrowDown') {
      nextIdx = currentIdx < 0 ? 0 : Math.min(currentIdx + 1, galleryDisplayedAssets.length - 1);
    } else {
      nextIdx = currentIdx <= 0 ? 0 : currentIdx - 1;
    }
    const asset = galleryDisplayedAssets[nextIdx];
    activeGalleryAssetId = asset.id;
    loadAsset(asset);
    state._assetId = asset.id;
    clearSelection();
    renderSelection();
    // Update active highlight & scroll into view
    galleryList.querySelectorAll('.gallery-card').forEach(c => c.classList.remove('active'));
    const cards = galleryList.querySelectorAll('.gallery-card');
    if (cards[nextIdx]) {
      cards[nextIdx].classList.add('active');
      cards[nextIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
    return;
  }

  // ── Edit mode: nudge / delete selected elements ──
  if (state.selectedIds.size === 0) return;

  if (e.key === 'Delete' || e.key === 'Backspace') {
    stateDeleteSelected();
    e.preventDefault();
    return;
  }

  // Nudge all selected with arrow keys
  const nudge = e.shiftKey ? 10 : 1;
  const isArrowAny = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key);
  if (!isArrowAny) return;

  for (const selId of state.selectedIds) {
    const el = state.elements.find(el => el.id === selId);
    if (!el) continue;
    if (e.key === 'ArrowLeft')  stateUpdateElement(selId, { cx: (el.params.cx||256) - nudge });
    if (e.key === 'ArrowRight') stateUpdateElement(selId, { cx: (el.params.cx||256) + nudge });
    if (e.key === 'ArrowUp')    stateUpdateElement(selId, { cy: (el.params.cy||256) - nudge });
    if (e.key === 'ArrowDown')  stateUpdateElement(selId, { cy: (el.params.cy||256) + nudge });
  }
  renderPropsPanel();
  e.preventDefault();
});

// ─────────────────────────────────────────────────────────────────
//  PANEL — SHAPES TAB
// ─────────────────────────────────────────────────────────────────
function renderShapesPanel() {
  const container = document.getElementById('tab-shapes');
  const byCategory = getPrimitivesByCategory();
  container.innerHTML = '';

  for (const [cat, prims] of Object.entries(byCategory)) {
    const catLabel = document.createElement('div');
    catLabel.className = 'category-label';
    catLabel.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    container.appendChild(catLabel);

    const grid = document.createElement('div');
    grid.className = 'shapes-grid';

    for (const prim of prims) {
      const btn = document.createElement('button');
      btn.className = 'shape-btn';
      btn.title = prim.name;
      btn.innerHTML = `<span>${prim.icon}</span><span class="shape-name">${prim.name}</span>`;
      btn.addEventListener('click', () => {
        const el = stateAddElement(prim.id);
        // Don't switch to props tab — let user add multiple shapes in a row
        // Visual feedback: flash the new shape on the canvas
        if (el) flashElement(el.id);
        toast(`Added ${prim.name}`);
      });
      grid.appendChild(btn);
    }
    container.appendChild(grid);
  }
}

// ─────────────────────────────────────────────────────────────────
//  PANEL — COLORS TAB
// ─────────────────────────────────────────────────────────────────
function renderColorsPanel() {
  const roleList = document.getElementById('role-list');
  const miniPalettes = document.getElementById('mini-palettes');
  roleList.innerHTML = '';
  miniPalettes.innerHTML = '';

  // Render the 3 color role rows, each with an inline popup picker
  for (const role of COLOR_ROLES) {
    const hex = colorAssignments[role];
    const isOpen = openPickerRole === role;
    const row = document.createElement('div');
    row.className = 'color-role-row' + (isOpen ? ' editing' : '');
    row.innerHTML = `
      <div class="role-dot" style="background:${hex}"></div>
      <span class="role-label">${role}</span>
      <span class="role-hex">${hex}</span>
    `;

    // Toggle popup on click
    row.addEventListener('click', (e) => {
      e.stopPropagation();
      openPickerRole = (openPickerRole === role) ? null : role;
      renderColorsPanel();
    });
    roleList.appendChild(row);

    // Render inline DB32 popup if this role is being edited
    if (isOpen && DB32) {
      const popup = document.createElement('div');
      popup.className = 'db32-popup';
      popup.addEventListener('click', (e) => e.stopPropagation());

      const grid = document.createElement('div');
      grid.className = 'db32-popup-grid';

      for (const color of DB32.colors) {
        const swatch = document.createElement('div');
        swatch.className = 'db32-swatch';
        swatch.style.background = color.hex;
        swatch.title = `${color.name} (${color.hex})`;
        if (colorAssignments[role] === color.hex) swatch.classList.add('active');

        swatch.addEventListener('click', (e) => {
          e.stopPropagation();
          colorAssignments[role] = color.hex;
          applyColorsToDOM();
          openPickerRole = null;
          renderColorsPanel();
          renderStage();
          toast(`${role}: ${color.name}`);
        });
        grid.appendChild(swatch);
      }
      popup.appendChild(grid);
      roleList.appendChild(popup);
    }
  }

  // Render mini palette quick picks
  if (DB32) {
    for (const mp of MINI_PALETTES) {
      const row = document.createElement('div');
      row.className = 'mini-palette-row';
      row.title = mp.name;
      row.innerHTML = `
        <div class="mini-swatch primary-swatch" style="background:${DB32.colors[mp.primary].hex}"></div>
        <div class="mini-swatch secondary-swatch" style="background:${DB32.colors[mp.secondary].hex}"></div>
        <div class="mini-swatch tertiary-swatch" style="background:${DB32.colors[mp.tertiary].hex}"></div>
        <span class="mini-palette-name">${mp.name}</span>
      `;
      row.addEventListener('click', () => {
        colorAssignments.primary   = DB32.colors[mp.primary].hex;
        colorAssignments.secondary = DB32.colors[mp.secondary].hex;
        colorAssignments.tertiary  = DB32.colors[mp.tertiary].hex;
        applyColorsToDOM();
        renderColorsPanel();
        renderStage();
        toast(`Palette: ${mp.name}`);
      });
      miniPalettes.appendChild(row);
    }
  }
}

// ─────────────────────────────────────────────────────────────────
//  PANEL — FRAME TAB
// ─────────────────────────────────────────────────────────────────
const anchorLayer = document.getElementById('anchor-layer');

function renderFramePanel() {
  // Aspect ratio preset buttons
  const presetsEl = document.getElementById('frame-presets');
  presetsEl.innerHTML = '';
  for (const preset of FRAME_PRESETS) {
    const btn = document.createElement('button');
    btn.className = 'frame-preset-btn' + (state.framePreset === preset.id ? ' active' : '');
    btn.innerHTML = `
      <div class="frame-icon" style="width:${preset.iconW}px;height:${preset.iconH}px"></div>
      ${preset.label}
    `;
    btn.addEventListener('click', () => {
      state.framePreset = preset.id;
      state.viewBox = { w: preset.w, h: preset.h };
      // Recenter anchor to canvas center (always 256,256)
      state.anchor = { x: 256, y: 256 };
      applyFrame();
      renderFramePanel();
    });
    presetsEl.appendChild(btn);
  }

  // Background colour section
  const bgSection = document.getElementById('bg-color-section');
  bgSection.innerHTML = '';

  // Transparent option
  const transRow = document.createElement('div');
  transRow.className = 'bg-color-row' + (!bgColor ? ' editing' : '');
  transRow.innerHTML = `
    <div class="bg-swatch transparent-swatch"></div>
    <span style="font-size:12px;color:var(--app-text);font-weight:600;flex:1">Transparent</span>
    ${!bgColor ? '<span style="font-size:10px;color:var(--app-accent)">Active</span>' : ''}
  `;
  transRow.addEventListener('click', () => {
    bgColor = null;
    openBgPicker = false;
    applyColorsToDOM();
    renderFramePanel();
  });
  bgSection.appendChild(transRow);

  // Colour option
  const colorRow = document.createElement('div');
  colorRow.className = 'bg-color-row' + (bgColor ? ' editing' : '');
  colorRow.innerHTML = `
    <div class="bg-swatch" style="background:${bgColor || '#555'}"></div>
    <span style="font-size:12px;color:var(--app-text);font-weight:600;flex:1">Solid Colour</span>
    ${bgColor ? `<span style="font-size:10px;color:var(--app-text-muted);font-family:monospace">${bgColor}</span>` : ''}
  `;
  colorRow.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!bgColor) bgColor = '#ffffff';
    openBgPicker = !openBgPicker;
    applyColorsToDOM();
    renderFramePanel();
  });
  bgSection.appendChild(colorRow);

  // DB32 picker for background (if open)
  if (openBgPicker && DB32) {
    const popup = document.createElement('div');
    popup.className = 'db32-popup';
    popup.addEventListener('click', (e) => e.stopPropagation());
    const grid = document.createElement('div');
    grid.className = 'db32-popup-grid';
    for (const color of DB32.colors) {
      const swatch = document.createElement('div');
      swatch.className = 'db32-swatch';
      swatch.style.background = color.hex;
      swatch.title = `${color.name} (${color.hex})`;
      if (bgColor === color.hex) swatch.classList.add('active');
      swatch.addEventListener('click', (e) => {
        e.stopPropagation();
        bgColor = color.hex;
        openBgPicker = false;
        applyColorsToDOM();
        renderFramePanel();
        toast(`Background: ${color.name}`);
      });
      grid.appendChild(swatch);
    }
    popup.appendChild(grid);
    bgSection.appendChild(popup);
  }

  // Anchor coordinates
  document.getElementById('anchor-x').value = state.anchor.x;
  document.getElementById('anchor-y').value = state.anchor.y;
}

function applyFrame() {
  const { w, h } = state.viewBox;
  const { x: ox, y: oy } = frameOrigin(w, h);
  svgCanvas.setAttribute('viewBox', `${ox} ${oy} ${w} ${h}`);
  // Keep the SVG element a reasonable display size (scale to fit)
  svgCanvas.setAttribute('width', w);
  svgCanvas.setAttribute('height', h);
  // Checker and bg rect must cover the full viewBox area
  document.querySelector('.canvas-bg').setAttribute('x', ox);
  document.querySelector('.canvas-bg').setAttribute('y', oy);
  document.querySelector('.canvas-bg').setAttribute('width', w);
  document.querySelector('.canvas-bg').setAttribute('height', h);
  document.getElementById('bg-color-rect').setAttribute('x', ox);
  document.getElementById('bg-color-rect').setAttribute('y', oy);
  document.getElementById('bg-color-rect').setAttribute('width', w);
  document.getElementById('bg-color-rect').setAttribute('height', h);
  updateAnchorVisual();
}

function updateAnchorVisual() {
  const { x, y } = state.anchor;
  const armLen = 20;
  document.getElementById('anchor-h').setAttribute('x1', x - armLen);
  document.getElementById('anchor-h').setAttribute('y1', y);
  document.getElementById('anchor-h').setAttribute('x2', x + armLen);
  document.getElementById('anchor-h').setAttribute('y2', y);
  document.getElementById('anchor-v').setAttribute('x1', x);
  document.getElementById('anchor-v').setAttribute('y1', y - armLen);
  document.getElementById('anchor-v').setAttribute('x2', x);
  document.getElementById('anchor-v').setAttribute('y2', y + armLen);
  document.getElementById('anchor-dot').setAttribute('cx', x);
  document.getElementById('anchor-dot').setAttribute('cy', y);
}

// Show/hide anchor when frame tab is active
function updateAnchorVisibility() {
  anchorLayer.style.display = (activeTab === 'frame') ? '' : 'none';
}

// Anchor coordinate inputs
document.getElementById('anchor-x').addEventListener('input', (e) => {
  const { x: ox } = frameOrigin(state.viewBox.w, state.viewBox.h);
  state.anchor.x = Math.max(ox, Math.min(ox + state.viewBox.w, parseInt(e.target.value) || 0));
  updateAnchorVisual();
});
document.getElementById('anchor-y').addEventListener('input', (e) => {
  const { y: oy } = frameOrigin(state.viewBox.w, state.viewBox.h);
  state.anchor.y = Math.max(oy, Math.min(oy + state.viewBox.h, parseInt(e.target.value) || 0));
  updateAnchorVisual();
});

// Anchor point drag
let anchorDrag = null;
document.getElementById('anchor-dot').addEventListener('pointerdown', (e) => {
  e.stopPropagation();
  const p = svgPoint(e.clientX, e.clientY);
  anchorDrag = true;
  svgCanvas.setPointerCapture(e.pointerId);
  e.preventDefault();
});

// Recenter anchor button
document.getElementById('anchor-recenter').addEventListener('click', () => {
  state.anchor = { x: 256, y: 256 };
  updateAnchorVisual();
  document.getElementById('anchor-x').value = 256;
  document.getElementById('anchor-y').value = 256;
  toast('Anchor centered');
});

// Anchor drag is handled inside the main pointermove/pointerup listeners below

// ─────────────────────────────────────────────────────────────────
//  PANEL — PROPS TAB
// ─────────────────────────────────────────────────────────────────
function renderPropsPanel() {
  const overlay = document.getElementById('props-overlay');
  const formEl = document.getElementById('props-form');

  if (state.selectedIds.size === 0) {
    overlay.classList.remove('open');
    if (appMode === 'properties') enterEditMode(state._assetId);
    return;
  }

  // Multi-select: show summary instead of full properties
  if (state.selectedIds.size > 1) {
    overlay.classList.add('open');
    if (appMode === 'editing') enterPropertiesMode();
    formEl.innerHTML = `
      <div class="section-label">${state.selectedIds.size} shapes selected</div>
      <p style="color:var(--app-text-muted);font-size:12px;margin-bottom:16px">
        Drag to move together, or press Delete to remove all.
      </p>
      <button class="delete-btn" id="btn-delete-selected">Delete All Selected</button>
    `;
    document.getElementById('btn-delete-selected').addEventListener('click', stateDeleteSelected);
    return;
  }

  // Single selection — show full properties
  const selId = [...state.selectedIds][0];
  const el = state.elements.find(e => e.id === selId);
  if (!el) {
    overlay.classList.remove('open');
    return;
  }

  overlay.classList.add('open');
  if (appMode === 'editing') enterPropertiesMode();

  const prim = getPrimitive(el.primitiveId);
  if (!prim) return;

  formEl.innerHTML = `
    <div class="section-label">${prim.name}</div>
    <div class="layer-controls">
      <button class="layer-btn" id="layer-down" title="Move layer down">↓ Back</button>
      <button class="layer-btn" id="layer-up" title="Move layer up">↑ Front</button>
    </div>
    <div id="param-fields"></div>
    <button class="delete-btn" id="btn-delete-el">Delete Shape</button>
  `;

  document.getElementById('layer-up').addEventListener('click', () => {
    stateMoveLayer(selId, 'up');
  });
  document.getElementById('layer-down').addEventListener('click', () => {
    stateMoveLayer(selId, 'down');
  });
  document.getElementById('btn-delete-el').addEventListener('click', () => {
    stateDeleteElement(selId);
  });

  const paramFields = document.getElementById('param-fields');

  for (const param of prim.params) {
    const row = document.createElement('div');
    row.className = 'prop-row';

    const label = document.createElement('span');
    label.className = 'prop-label';
    label.textContent = param.label;
    row.appendChild(label);

    let input;

    if (param.type === 'token') {
      input = document.createElement('select');
      input.className = 'prop-token-select';
      // 'none' option
      const noneOpt = document.createElement('option');
      noneOpt.value = 'none';
      noneOpt.textContent = '— none —';
      if (el.params[param.key] === 'none') noneOpt.selected = true;
      input.appendChild(noneOpt);

      // Color role options
      for (const role of COLOR_ROLES) {
        const opt = document.createElement('option');
        opt.value = role;
        opt.textContent = `${role} (${colorAssignments[role]})`;
        if (el.params[param.key] === role) opt.selected = true;
        input.appendChild(opt);
      }
      input.addEventListener('change', () => {
        stateUpdateElement(selId, { [param.key]: input.value });
      });

    } else if (param.type === 'range') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1';

      input = document.createElement('input');
      input.type = 'range';
      input.className = 'prop-range';
      input.min = param.min ?? 0;
      input.max = param.max ?? 100;
      input.step = param.step ?? 1;
      input.value = el.params[param.key] ?? 0;
      input.style.flex = '1';

      const valDisplay = document.createElement('span');
      valDisplay.style.cssText = 'font-size:10px;color:var(--app-text-muted);width:32px;text-align:right';
      valDisplay.textContent = Math.round(input.value * 100) / 100;

      input.addEventListener('input', () => {
        const v = parseFloat(input.value);
        stateUpdateElement(selId, { [param.key]: v });
        valDisplay.textContent = Math.round(v * 100) / 100;
      });

      wrapper.appendChild(input);
      wrapper.appendChild(valDisplay);
      row.appendChild(label);
      row.appendChild(wrapper);
      paramFields.appendChild(row);
      continue;
    }

    row.appendChild(label);
    row.appendChild(input);
    paramFields.appendChild(row);
  }

  // Position inputs
  const posDiv = document.createElement('div');
  posDiv.innerHTML = `<div class="section-label" style="margin-top:16px">Position</div>`;
  paramFields.appendChild(posDiv);

  for (const axis of ['cx', 'cy']) {
    const row = document.createElement('div');
    row.className = 'prop-row';
    const label = document.createElement('span');
    label.className = 'prop-label';
    label.textContent = axis === 'cx' ? 'X' : 'Y';
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'prop-input';
    input.value = el.params[axis] ?? 256;
    input.style.width = '70px';
    input.addEventListener('input', () => {
      stateUpdateElement(selId, { [axis]: parseFloat(input.value) || 0 });
    });
    row.appendChild(label);
    row.appendChild(input);
    paramFields.appendChild(row);
  }
}

function buildSystemPrompt(mode = 'create') {
  // Build a compact color list from DB32
  const colorList = DB32 ? DB32.colors.map(c => `${c.index}:${c.name}(${c.hex})`).join(', ') : '';

  let base;
  if (systemPromptTemplate) {
    base = systemPromptTemplate.replace('{{PALETTE}}', colorList);
  } else {
    base = `You are an SVG asset builder. Canvas is 512×512. Return JSON with: name, description, tags, frame ("wide"|"landscape"|"square"|"portrait3"|"tall"), colors ({primary,secondary,tertiary} as hex), background (hex or null), anchor ({x,y}), elements ([{primitiveId, params}]). Available primitives: circle, square, ellipse, rect, rounded-rect, triangle, pentagon, hexagon, diamond, star-4, star-5, star-6, ring, cross, arc, line. Color roles for fill/stroke: "primary","secondary","tertiary","none". DawnBringer 32 palette: ${colorList}`;
  }

  if (mode === 'modify') {
    base += `\n\n## Modification Mode\n\nYou are modifying an EXISTING asset. The user will describe a change they want. You will receive the current asset state (elements, colors, frame, etc.) as context. Apply the requested change and return the COMPLETE updated asset JSON — including all unchanged elements alongside modified ones. Preserve anything the user didn't ask to change. You can add, remove, reposition, recolor, or resize shapes as needed. Always return the full JSON response in the same format as a new asset.`;
  }

  return base;
}

// Build a compact snapshot of the current asset state for the AI to modify
function buildCurrentAssetContext() {
  const elements = state.elements.map(el => ({
    primitiveId: el.primitiveId,

  }));
  return JSON.stringify({
    name: state.meta.name,
    description: state.meta.description,
    tags: state.meta.tags,
    frame: state.framePreset,

// Call Anthropic API
async function callClaude(userPrompt, mode = 'create') {
  const apiKey = getApiKey();
  if (!apiKey) {
    toast('Set your API key first (Menu → API Key)');
    return null;
  }

  // Build messages — for modify mode, include current state as context
  let userContent = userPrompt;
  if (mode === 'modify') {
    const currentState = buildCurrentAssetContext();
    userContent = `Here is the current asset:\n\`\`\`json\n${currentState}\n\`\`\`\n\nRequested change: ${userPrompt}`;
  }

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: 2048,
      system: buildSystemPrompt(mode),
      messages: [{ role: 'user', content: userContent }],
    }),
  });

  if (!response.ok) {
    const errText = await response.text();
    if (response.status === 401) throw new Error('Invalid API key');
    if (response.status === 429) throw new Error('Rate limited — wait a moment');
    throw new Error(`API error ${response.status}: ${errText.slice(0, 100)}`);
  }

  const data = await response.json();
  const text = data.content?.[0]?.text || '';
  return text;
}

// Parse Claude's response into usable shape data
function parseAIResponse(text) {
  // Extract JSON from the response (handle markdown code blocks)
  let jsonStr = text;
  const codeBlockMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (codeBlockMatch) jsonStr = codeBlockMatch[1];

  // Try to find a JSON object
  const objMatch = jsonStr.match(/\{[\s\S]*\}/);
  if (!objMatch) throw new Error('No valid JSON found in response');

  const parsed = JSON.parse(objMatch[0]);
  if (!parsed.elements || !Array.isArray(parsed.elements)) {
    throw new Error('Response missing elements array');
  }

  return parsed;
}

// Main generate handler
let isGenerating = false;
let generateMode = 'modify';  // 'modify' = change current item, 'create' = new from scratch

async function handleGenerate() {
  const promptInput = document.getElementById('prompt-input');
  const generateBtn = document.getElementById('btn-generate');
  const prompt = promptInput.value.trim();

  if (!prompt) {
    toast('Enter a description first');
    return;
  }

  if (isGenerating) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    toast('Set your API key first (Menu → 🔑 API Key)');
    return;
  }

  const mode = generateMode;

  // Set loading state
  isGenerating = true;
  generateBtn.classList.add('generating');
  promptInput.classList.add('generating');
  generateBtn.innerHTML = '⟳';

  // Persistent toast that stays until generation completes
  const toastMsg = mode === 'create'
    ? `Creating "${prompt.slice(0, 30)}${prompt.length > 30 ? '…' : ''}"…`
    : `Updating ${state.meta.name || 'asset'}…`;
  toastPersist(toastMsg);

  try {
    const responseText = await callClaude(prompt, mode);
    if (!responseText) return;

    const result = parseAIResponse(responseText);

    // Clear canvas and apply the AI-generated shapes
    state.elements = [];
    clearSelection();
    state._nextId = 1;
    if (mode === 'create') {
      state._assetId = null;
    }

    // ── Apply AI color choices ──
    if (result.colors) {
      if (result.colors.primary)   colorAssignments.primary   = result.colors.primary;
      if (result.colors.secondary) colorAssignments.secondary = result.colors.secondary;
      if (result.colors.tertiary)  colorAssignments.tertiary  = result.colors.tertiary;
      applyColorsToDOM();
      renderColorsPanel();
    }

    // ── Apply AI background choice ──
    if (result.background !== undefined) {
      bgColor = result.background;  // hex string or null
      applyColorsToDOM();
    }

    // ── Apply AI frame choice ──
    if (result.frame) {
      const frameId = FRAME_ALIASES[result.frame] || result.frame;
      const preset = FRAME_PRESETS.find(p => p.id === frameId);
      if (preset) {
        state.framePreset = preset.id;
        state.viewBox = { w: preset.w, h: preset.h };
        applyFrame();
        renderFramePanel();
      }
    }

    // ── Apply AI anchor choice ──
    if (result.anchor && typeof result.anchor.x === 'number' && typeof result.anchor.y === 'number') {
      state.anchor.x = result.anchor.x;
      state.anchor.y = result.anchor.y;
      updateAnchorVisual();
      const axEl = document.getElementById('anchor-x');
      const ayEl = document.getElementById('anchor-y');
      if (axEl) axEl.value = result.anchor.x;
      if (ayEl) ayEl.value = result.anchor.y;
    }

    // Set metadata from response
    if (result.name) {
      state.meta.name = result.name;
      document.getElementById('item-name-display').textContent = result.name;
    }
    if (result.description) state.meta.description = result.description;
    if (result.tags) state.meta.tags = result.tags;

    // Add each element
    let added = 0;
    for (const el of result.elements.slice(0, 20)) {
      const prim = getPrimitive(el.primitiveId);
      if (!prim) continue;
      const params = { ...prim.defaults, ...el.params };
      stateAddElement(el.primitiveId, params);
      added++;
    }

    syncFileTabToState();
    promptInput.value = '';

    const verb = mode === 'create' ? 'Created' : 'Updated';
    toast(`${verb} "${result.name || 'Asset'}" — ${added} shapes`);

    // If we were in create-new mode, return to normal modify mode
    if (mode === 'create') {
      exitCreateNewMode();
    }

  } catch (err) {
    console.error('AI generation error:', err);
    toast(`Error: ${err.message}`);
  } finally {
    isGenerating = false;
    generateBtn.classList.remove('generating');
    promptInput.classList.remove('generating');
    generateBtn.innerHTML = '↑';
  }
}

// ─────────────────────────────────────────────────────────────────
//  ASSET BUILDER — creates the JSON envelope from current state
// ─────────────────────────────────────────────────────────────────

async function buildAsset() {
  const name = state.meta.name || 'Untitled';
  const desc = state.meta.description || '';
  const tags = state.meta.tags || [];
  const layer = state.meta.layer || null;

  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  const ts = Date.now();
  // Reuse existing ID if we're re-saving (editing an existing asset)
  const id = state._assetId || `asset_${slug}_${ts}`;
  const now = new Date().toISOString();

  const svgElements = state.elements.map(el => {
    const prim = getPrimitive(el.primitiveId);
    return prim ? prim.toSVGElement(el.params) : '';
  }).join('\n  ');

  const { w: vw, h: vh } = state.viewBox;
  const { x: vox, y: voy } = frameOrigin(vw, vh);
  const bgEl = bgColor ? `<rect x="${vox}" y="${voy}" width="${vw}" height="${vh}" fill="${bgColor}"/>\n  ` : '';
  const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vox} ${voy} ${vw} ${vh}">\n  ${bgEl}${svgElements}\n</svg>`;

  const usedRoles = [...new Set(
    state.elements.flatMap(el => {
      const prim = getPrimitive(el.primitiveId);
      if (!prim) return [];
      return prim.params
        .filter(p => p.type === 'token')
        .map(p => el.params[p.key])
        .filter(v => v && v !== 'none');
    })
  )];

  const naturalSize = { w: vw, h: vh };

  let thumbnail = null;
  try {
    thumbnail = await generateThumbnail(svgString, colorAssignments);
  } catch {}

  const primitiveRefs = state.elements.map(el => ({
    primitiveId: el.primitiveId,
    params: { ...el.params },
    zIndex: el.zIndex,
  }));

  return {
    id,
    type: 'asset',
    name,
    tags,
    meta: {
      created: state._created,
      modified: now,
      origin: 'user',
      origin_ref: null,
      creator: 'local-user',
      version: state._version,
      thumbnail,
    },
    payload: {
      description: desc,
      format: 'svg',
      viewBox: `${vox} ${voy} ${vw} ${vh}`,
      svg: svgString,
      color_roles_used: usedRoles,
      color_assignments: { ...colorAssignments },
      background_color: bgColor || null,
      palette_id: DB32 ? DB32.id : null,
      frame_preset: state.framePreset,
      anchor_point: { ...state.anchor },
      natural_size: naturalSize,
      attach_points: {},
      layer: layer || null,
      z_index: 0,
      _editor: {
        elements: primitiveRefs,
        color_assignments: { ...colorAssignments },
      },
    },
  };
}

// ─────────────────────────────────────────────────────────────────
//  IndexedDB — persistent asset storage
// ─────────────────────────────────────────────────────────────────
const DB_NAME = 'imagebox_assets';
const DB_VERSION = 1;
const STORE_NAME = 'assets';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        store.createIndex('name', 'name', { unique: false });
        store.createIndex('modified', 'meta.modified', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbSave(asset) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(asset);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => {
      // Sort by modified date, newest first
      const assets = req.result.sort((a, b) =>
        (b.meta?.modified || '').localeCompare(a.meta?.modified || '')
      );
      resolve(assets);
    };
    req.onerror = () => reject(req.error);
  });
}

async function dbGet(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ── Auto-import: loads template assets from assets/emojis/ on first run ──
async function importBatchAssets() {
  try {
    const res = await fetch('./assets/emojis/manifest.json');
    if (!res.ok) return; // no manifest = nothing to import
    const manifest = await res.json();
    if (!manifest.batches?.length) return;

    const db = await openDB();

    for (const batch of manifest.batches) {
      for (const file of batch.files) {
        const url = `./assets/emojis/${file}`;
        try {
          const assetRes = await fetch(url);
          if (!assetRes.ok) continue;
          const asset = await assetRes.json();

          // Check if already in DB by asset's own ID
          const existing = await new Promise((resolve) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).get(asset.id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(null);
          });
          if (existing) continue; // already imported

          await new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(asset);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          });
        } catch { /* skip individual failures silently */ }
      }
    }
    db.close();
  } catch { /* manifest not found or unreadable — that's fine */ }
}

}

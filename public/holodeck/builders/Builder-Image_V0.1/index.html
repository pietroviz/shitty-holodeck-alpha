let galleryDisplayedAssets = [];   // Currently visible assets in gallery (for arrow nav)

function setAppState(newState) {
  appMode = newState;
  // Update panel class
  panel.className = newState;
  // Update body class for stage-level styling
  document.body.className = `state-${newState}`;
}

function enterClosedMode() {
  setAppState('closed');
  clearSelection();
  renderSelection();
}

function enterBrowseMode() {
  setAppState('browse');
  clearSelection();
  renderSelection();
  gallerySearch.value = '';
  renderGallery('');
}

function enterSearchMode() {
  setAppState('search');
  gallerySearch.value = '';
  renderGallery('');
  setTimeout(() => gallerySearch.focus(), 50);
}

function enterEditMode(assetId) {
  activeGalleryAssetId = assetId || state._assetId;
  // Clean up properties overlay if coming from properties state
  document.getElementById('props-overlay').classList.remove('open');
  // Snapshot current state for Cancel
  preEditSnapshot = JSON.stringify({
    elements: state.elements,
    meta: { ...state.meta },
    framePreset: state.framePreset,
    viewBox: { ...state.viewBox },
    anchor: { ...state.anchor },
    colorAssignments: { ...colorAssignments },
    bgColor,
  });
  setAppState('editing');
  syncFileTabToState();
  renderFramePanel();
}

function enterPropertiesMode() {
  setAppState('properties');
}

// Category state
let activeCategory = 'all'; // 'all', 'my-stuff', or a batch id like 'animals-nature'

// All categories: built-in + loaded from manifest
let allCategories = [
  { id: 'all',      label: 'All' },
  { id: 'my-stuff', label: 'My Stuff' },
];

// Map from batch id → display name
let batchCategoryNames = {};

async function loadBatchCategoryNames() {
  try {
    const res = await fetch('./assets/emojis/manifest.json');
    if (!res.ok) return;
    const manifest = await res.json();
    for (const batch of manifest.batches || []) {
      batchCategoryNames[batch.id] = batch.name;
      allCategories.push({ id: batch.id, label: batch.name });
    }
  } catch {}
}

function openGallery() {
  enterBrowseMode();
}

// "New" button in gallery header
document.getElementById('gallery-new-btn').addEventListener('click', () => {
  resetState();
  enterEditMode(null);
  toast('New asset');
});

function renderCategoryDropdown(assets) {
  // Count assets per category for display
  const counts = {};
  for (const a of assets) {
    counts['all'] = (counts['all'] || 0) + 1;
    const cat = getAssetCategory(a);
    counts[cat] = (counts[cat] || 0) + 1;
  }

  galleryCategorySelect.innerHTML = '';
  for (const cat of allCategories) {
    const opt = document.createElement('option');
    opt.value = cat.id;
    const count = counts[cat.id] || 0;
    opt.textContent = count > 0 ? `${cat.label} (${count})` : cat.label;
    if (cat.id === activeCategory) opt.selected = true;
    galleryCategorySelect.appendChild(opt);
  }
}

galleryCategorySelect.addEventListener('change', () => {
  activeCategory = galleryCategorySelect.value;
  renderGallery(gallerySearch.value);
});

// Legacy origin_ref mapping (for assets imported before rename)
const ORIGIN_REF_ALIASES = { 'emoji-animals': 'animals-nature' };

function getAssetCategory(asset) {
  if (!asset.meta?.origin || asset.meta.origin === 'user') return 'my-stuff';
  const ref = asset.meta.origin_ref || '';
  return ORIGIN_REF_ALIASES[ref] || ref;
}

function filterByCategory(assets) {
  if (activeCategory === 'all') return assets;
  return assets.filter(a => getAssetCategory(a) === activeCategory);
}

async function renderGallery(filter = '') {
  const allAssets = await dbGetAll();

  // Render category dropdown using ALL assets (so counts stay accurate)
  renderCategoryDropdown(allAssets);

  // Apply category filter first
  let assets = filterByCategory(allAssets);

  // Then apply text search
  const lower = filter.toLowerCase();
  const filtered = filter
    ? assets.filter(a =>
        (a.name || '').toLowerCase().includes(lower) ||
        (a.tags || []).some(t => t.includes(lower)) ||
        (a.payload?.description || '').toLowerCase().includes(lower)
      )
    : assets;

  galleryDisplayedAssets = filtered;
  galleryCount.textContent = `${filtered.length} asset${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    galleryList.innerHTML = filter
      ? `<div class="gallery-empty">No assets match "${filter}"</div>`
      : activeCategory === 'my-stuff'
        ? `<div class="gallery-empty">No saved assets yet.<br>Create something and hit <strong>Done</strong> to save it here.</div>`
        : `<div class="gallery-empty">No assets in this category.</div>`;
    return;
  }

  galleryList.innerHTML = '';
  for (const asset of filtered) {
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.dataset.id = asset.id;

    const thumb = asset.meta?.thumbnail
      ? `<img src="${asset.meta.thumbnail}" alt="${asset.name}"/>`
      : `<span class="gallery-thumb-placeholder">◻</span>`;

    const tagsStr = (asset.tags || []).join(', ');
    const modified = asset.meta?.modified
      ? new Date(asset.meta.modified).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
      : '';

    const isActive = activeGalleryAssetId === asset.id;
    card.innerHTML = `
      <div class="gallery-thumb">${thumb}</div>
      <div class="gallery-info">
        <div class="gallery-name">${asset.name || 'Untitled'}</div>
        <div class="gallery-meta">${modified}</div>
        ${tagsStr ? `<div class="gallery-tags">${tagsStr}</div>` : ''}
      </div>
      <div class="gallery-actions">
        <button class="gallery-action-btn edit" title="Edit">✎</button>
        <button class="gallery-action-btn delete" title="Delete">🗑</button>
      </div>
    `;
    if (isActive) card.classList.add('active');

    // Click card = preview on canvas (read-only)
    card.addEventListener('click', (e) => {
      if (e.target.closest('.gallery-action-btn')) return;
      activeGalleryAssetId = asset.id;
      loadAsset(asset);
      state._assetId = asset.id;
      clearSelection();
      renderSelection();
      // Update active highlight
      galleryList.querySelectorAll('.gallery-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    });

    // Edit button — enter edit mode
    card.querySelector('.edit').addEventListener('click', (e) => {
      e.stopPropagation();
      activeGalleryAssetId = asset.id;
      loadAsset(asset);
      state._assetId = asset.id;
      enterEditMode(asset.id);
    });

    // Delete button
    card.querySelector('.delete').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete "${asset.name || 'Untitled'}"?`)) return;
      await dbDelete(asset.id);
      if (activeGalleryAssetId === asset.id) activeGalleryAssetId = null;
      toast(`Deleted: ${asset.name || 'Untitled'}`);
      renderGallery(gallerySearch.value);
    });

    galleryList.appendChild(card);
  }

  // Lazily generate thumbnails for assets that don't have them yet
  ensureThumbnails(filtered);
}

// Live search
gallerySearch.addEventListener('input', () => {
  renderGallery(gallerySearch.value);
});

async function generateThumbnail(svgString, palette) {
  // Resolve CSS token vars to hex for standalone rendering
  const resolved = resolveTokens(svgString, palette);
  return new Promise((resolve, reject) => {
    const blob = new Blob([resolved], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 128, 128);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(); };
    img.src = url;
  });
}

// Build SVG string from an asset's stored editor data (for batch assets that lack pre-rendered SVG)
function buildSVGFromAsset(asset) {
  const editor = asset.payload?._editor;
  if (!editor?.elements?.length) return null;

  const elements = editor.elements;
  const assignments = asset.payload?.color_assignments || editor.color_assignments || {};
  const vbStr = asset.payload?.viewBox || '56 56 400 400';
  const [vox, voy, vw, vh] = vbStr.split(' ').map(Number);
  const bg = asset.payload?.background_color;

  const svgElements = elements.map(el => {
    const prim = getPrimitive(el.primitiveId);
    return prim ? prim.toSVGElement(el.params) : '';
  }).filter(Boolean).join('\n  ');

  const bgEl = bg ? `<rect x="${vox}" y="${voy}" width="${vw}" height="${vh}" fill="${bg}"/>\n  ` : '';
  return {
    svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vox} ${voy} ${vw} ${vh}">\n  ${bgEl}${svgElements}\n</svg>`,
    assignments,
  };
}

// Lazily generate and cache thumbnails for assets that are missing them
async function ensureThumbnails(assets) {
  const needsThumb = assets.filter(a => !a.meta?.thumbnail && a.payload?._editor?.elements?.length);
  if (needsThumb.length === 0) return;

  // Process in small batches to avoid blocking the UI
  const BATCH_SIZE = 8;
  for (let i = 0; i < needsThumb.length; i += BATCH_SIZE) {
    const batch = needsThumb.slice(i, i + BATCH_SIZE);
    await Promise.all(batch.map(async (asset) => {
      try {
        const result = buildSVGFromAsset(asset);
        if (!result) return;
        const thumb = await generateThumbnail(result.svg, result.assignments);
        asset.meta = asset.meta || {};
        asset.meta.thumbnail = thumb;
        // Persist to IndexedDB
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(asset);
      } catch {}
    }));
    // Update gallery cards that now have thumbnails
    for (const asset of batch) {
      if (!asset.meta?.thumbnail) continue;
      const card = galleryList.querySelector(`.gallery-card[data-id="${asset.id}"]`);
      if (card) {
        const thumbDiv = card.querySelector('.gallery-thumb');
        if (thumbDiv) thumbDiv.innerHTML = `<img src="${asset.meta.thumbnail}" alt="${asset.name}"/>`;
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────
//  OPEN / LOAD
// ─────────────────────────────────────────────────────────────────
document.getElementById('file-open').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const asset = JSON.parse(ev.target.result);
      loadAsset(asset);
    } catch {
      toast('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function loadAsset(asset) {
  if (!asset.payload) {
    toast('Not a valid Simbox asset');
    return;
  }

  state._assetId = asset.id || null;

  state.meta = {
    name: asset.name || 'Untitled',
    description: asset.payload.description || '',
    tags: asset.tags || [],
    layer: asset.payload.layer || '',
  };
  state._created = asset.meta?.created || new Date().toISOString();
  state._version = (asset.meta?.version || 1) + 1;

  document.getElementById('item-name-display').textContent = state.meta.name;

  // Restore frame state (with legacy ID migration)
  if (asset.payload.frame_preset) {
    const presetId = FRAME_ALIASES[asset.payload.frame_preset] || asset.payload.frame_preset;
    const preset = FRAME_PRESETS.find(p => p.id === presetId);
    if (preset) {
      state.framePreset = preset.id;
      state.viewBox = { w: preset.w, h: preset.h };
    }
  } else if (asset.payload.viewBox) {
    const parts = asset.payload.viewBox.split(/\s+/).map(Number);
    if (parts.length === 4) state.viewBox = { w: parts[2], h: parts[3] };
  }
  if (asset.payload.anchor_point) {
    state.anchor = { x: asset.payload.anchor_point.x, y: asset.payload.anchor_point.y };
  } else {
    state.anchor = { x: Math.round(state.viewBox.w / 2), y: Math.round(state.viewBox.h / 2) };
  }
  bgColor = asset.payload.background_color || null;
  applyFrame();

  // Restore color assignments if available
  const savedColors = asset.payload._editor?.color_assignments || asset.payload.color_assignments;
  if (savedColors) {
    for (const role of COLOR_ROLES) {
      if (savedColors[role]) colorAssignments[role] = savedColors[role];
    }
    applyColorsToDOM();
    renderColorsPanel();
  }

  // Restore editor state if available
  if (asset.payload._editor?.elements) {
    state.elements = [];
    state._nextId = 1;
    clearSelection();

    for (const ref of asset.payload._editor.elements) {
      const prim = getPrimitive(ref.primitiveId);
      if (!prim) continue;
      state.elements.push({
        id: nextId(),
        primitiveId: ref.primitiveId,
        params: { ...prim.defaults, ...ref.params },
        zIndex: ref.zIndex ?? state.elements.length,
      });
    }

    renderStage();
    syncFileTabToState();
    toast(`Loaded: ${state.meta.name}`);
  } else {
    // No editor state — show SVG as a static image overlay note
    syncFileTabToState();
    toast(`Loaded SVG (no editor state — view only)`);
  }
}

// ─────────────────────────────────────────────────────────────────
//  FILE TAB — live-sync fields with state
// ─────────────────────────────────────────────────────────────────
const fileNameInput  = document.getElementById('file-name');
const fileDescInput  = document.getElementById('file-desc');
const fileTagsInput  = document.getElementById('file-tags');

function syncFileTabToState() {
  fileNameInput.value  = state.meta.name;
  fileDescInput.value  = state.meta.description;
  fileTagsInput.value  = state.meta.tags.join(', ');
  updateCharCounts();
}

function updateCharCounts() {
  document.getElementById('file-name-count').textContent = fileNameInput.value.length;
  document.getElementById('file-desc-count').textContent = fileDescInput.value.length;
  document.getElementById('file-tags-count').textContent = fileTagsInput.value.length;
}

fileNameInput.addEventListener('input', () => {
  state.meta.name = fileNameInput.value.trim() || 'Untitled';
  document.getElementById('item-name-display').textContent = state.meta.name;
  updateCharCounts();
});

fileDescInput.addEventListener('input', () => {
  state.meta.description = fileDescInput.value.trim();
  updateCharCounts();
});

fileTagsInput.addEventListener('input', () => {
  // Auto-sanitize: lowercase, letters/numbers/commas/spaces only
  const raw = fileTagsInput.value;
  state.meta.tags = raw.split(',').map(t => t.trim().toLowerCase().replace(/[^a-z0-9-]/g, '')).filter(Boolean);
  updateCharCounts();
});


// ─────────────────────────────────────────────────────────────────
//  DONE / CANCEL BUTTONS
// ─────────────────────────────────────────────────────────────────
document.getElementById('btn-done').addEventListener('click', async () => {
  // Sync from file tab fields before saving
  state.meta.name = fileNameInput.value.trim() || 'Untitled';
  state.meta.description = fileDescInput.value.trim();
  state.meta.tags = fileTagsInput.value.split(',').map(t => t.trim().toLowerCase().replace(/[^a-z0-9-]/g, '')).filter(Boolean);

  document.getElementById('item-name-display').textContent = state.meta.name;
  await saveAsset();
  preEditSnapshot = null;
  enterClosedMode();
});

document.getElementById('btn-cancel').addEventListener('click', () => {
  if (appMode === 'browse') {
    // Close panel entirely
    enterClosedMode();
    return;
  }
  // Editing → restore state and go to closed
  if (preEditSnapshot) {
    try {
      const snap = JSON.parse(preEditSnapshot);
      state.elements = snap.elements;
      state.meta = snap.meta;
      state.framePreset = snap.framePreset;
      state.viewBox = snap.viewBox;
      state.anchor = snap.anchor;
      Object.assign(colorAssignments, snap.colorAssignments);
      bgColor = snap.bgColor;
      applyColorsToDOM();
      applyFrame();
      renderStage();
      syncFileTabToState();
      document.getElementById('item-name-display').textContent = state.meta.name;
    } catch {}
  }
  preEditSnapshot = null;
  enterClosedMode();
});

// Search toggle + close
document.getElementById('btn-search-toggle').addEventListener('click', () => {
  enterSearchMode();
});
document.getElementById('btn-search-close').addEventListener('click', () => {
  enterBrowseMode();
});

// Properties Back button
document.getElementById('btn-props-back').addEventListener('click', () => {
  clearSelection();
  renderSelection();
  hidePropsOverlay();
  enterEditMode(state._assetId);
});

// Edit button (bottom bar) — enters edit mode for current asset
document.getElementById('btn-edit-item').addEventListener('click', () => {
  enterEditMode(state._assetId);
});


// ─────────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  el.classList.remove('persist');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// Persistent toast that stays visible until dismissed by a regular toast() call
function toastPersist(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show', 'persist');
  clearTimeout(toastTimer);
}

// ─────────────────────────────────────────────────────────────────
//  DEFAULT HAPPY FACE — loaded on startup so canvas isn't empty
// ─────────────────────────────────────────────────────────────────
function loadDefaultAsset() {
  state.meta.name = 'Happy Face';
  state.meta.description = 'A friendly face to get you started';
  state.meta.tags = ['face', 'starter'];
  document.getElementById('item-name-display').textContent = 'Happy Face';

  // Face circle (primary)
  stateAddElement('circle', { cx: 256, cy: 256, r: 200, fill: 'primary', stroke: 'secondary', strokeWidth: 8 });
  // Left eye (tertiary)
  stateAddElement('circle', { cx: 200, cy: 210, r: 24, fill: 'tertiary', stroke: 'none', strokeWidth: 0 });
  // Right eye (tertiary)
  stateAddElement('circle', { cx: 312, cy: 210, r: 24, fill: 'tertiary', stroke: 'none', strokeWidth: 0 });
  // Smile (arc) — secondary
  stateAddElement('arc', { cx: 256, cy: 260, r: 100, startAngle: 20, endAngle: 160, thickness: 12, fill: 'secondary' });

  clearSelection();
  renderSelection();
  document.getElementById('props-overlay').classList.remove('open');
}

// ─────────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadDB32(), loadPrimitives(), loadSystemPrompt(), loadBatchCategoryNames()]);
  applyColorsToDOM();
  renderShapesPanel();
  renderColorsPanel();
  renderFramePanel();
  applyFrame();
  loadDefaultAsset();
  syncFileTabToState();
  // Auto-import emoji templates in background, then start in closed mode
  await importBatchAssets().catch(() => {});
  enterClosedMode();
}

init();
</script>

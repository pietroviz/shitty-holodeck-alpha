// ═══════════════════════════════════════════════════════════════

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

let toastTimer;
function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

async function init() {
  initThree();

  // Load primitives
  await loadPrimitives();

  // Load asset manifest
  try {
    const res = await fetch('./asset-manifest.json');
    const manifest = await res.json();
    state.assetManifest = manifest.assets || [];
    console.log(`Loaded ${state.assetManifest.length} assets from manifest`);
  } catch (e) {
    console.warn('Could not load asset manifest:', e);
  }

  // Load system prompt
  await loadSystemPrompt();

  // Load saved environments
  await loadAllEnvironments();

  // Init swatches and texture dropdowns
  initSwatches();
  populateTextureDropdowns();

  // Always apply a default greybox scene on startup
  const defaultEnv = createNewEnvironment('Default Scene');
  defaultEnv.payload.sky = { ...DEFAULT_ENV.sky };
  defaultEnv.payload.ground = { style: 'grid', color: '#595652', size: 20, textureId: null };
  defaultEnv.payload.walls = { layout: 'room', height: 3, color: '#696a6a', textureId: null };
  state.currentEnv = defaultEnv;
  applyEnvironment(defaultEnv);

  updateItemRow();

  // Open browse if we have environments, otherwise closed
  setState(state.environments.length > 0 ? 'closed' : 'closed');

  // Arrow key navigation + Escape
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

    const isArrow = ['ArrowUp', 'ArrowDown'].includes(e.key);

    // Browse/search mode: arrow keys step through gallery with live preview
    if ((state.mode === 'browse' || state.mode === 'search') && isArrow && galleryDisplayedEnvs.length > 0) {
      e.preventDefault();
      const currentIdx = galleryDisplayedEnvs.findIndex(env => env.id === state.currentEnv?.id);
      let nextIdx;
      if (e.key === 'ArrowDown') {
        nextIdx = currentIdx < 0 ? 0 : Math.min(currentIdx + 1, galleryDisplayedEnvs.length - 1);
      } else {
        nextIdx = currentIdx <= 0 ? 0 : currentIdx - 1;
      }
      const env = galleryDisplayedEnvs[nextIdx];
      state.currentEnv = env;
      applyEnvironment(env);
      updateItemRow();

      // Update active highlight & scroll into view
      const container = document.getElementById('gallery-list');
      container.querySelectorAll('.gallery-item').forEach(c => c.classList.remove('active'));
      const cards = container.querySelectorAll('.gallery-item');
      if (cards[nextIdx]) {
        cards[nextIdx].classList.add('active');
        cards[nextIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
      return;
    }

    // Escape closes panel or exits mode
    if (e.key === 'Escape') {
      if (state.mode === 'properties') { setState('editing'); activateTab('props'); }
      else if (state.mode === 'search') setState('browse');
      else if (state.mode === 'browse') setState('closed');
      else if (state.mode === 'editing') {
        if (state.preEditSnapshot) {
          state.currentEnv = JSON.parse(state.preEditSnapshot);
          applyEnvironment(state.currentEnv);
          state.preEditSnapshot = null;
        }
        setState('closed');
      }
    }
  });

  console.log('EnvironmentBuilder V2 initialized');
}

init();
</script>

<!-- Mobile bottom-sheet drag-to-resize handle.
     Adjusts --mobile-panel-height; the CSS variable only has effect
     under the mobile @media block, so this is a no-op on desktop. -->
<script>
(function () {
  const panel = document.getElementById('panel');
  const handle = document.getElementById('panel-drag-handle');
  if (!panel || !handle) return;

  const STORAGE_KEY = 'envBuilder.mobilePanelHeight';
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) panel.style.setProperty('--mobile-panel-height', saved);
  } catch (_) { /* ignore */ }

  let startY = 0;
  let startHeight = 0;

  function onPointerMove(ev) {
    const dy = startY - ev.clientY;
    const vh = window.innerHeight;
    const min = 48;
    const max = vh * 0.9;
    const h = Math.min(max, Math.max(min, startHeight + dy));
    panel.style.setProperty('--mobile-panel-height', h + 'px');
  }

  function onPointerUp(ev) {
    try { handle.releasePointerCapture(ev.pointerId); } catch (_) {}
    handle.removeEventListener('pointermove', onPointerMove);
    handle.removeEventListener('pointerup', onPointerUp);
    handle.removeEventListener('pointercancel', onPointerUp);
    try {
      const h = panel.style.getPropertyValue('--mobile-panel-height');
      if (h) localStorage.setItem(STORAGE_KEY, h);
    } catch (_) { /* ignore */ }
  }

  function onPointerDown(ev) {
    ev.preventDefault();
    startY = ev.clientY;
    startHeight = panel.getBoundingClientRect().height;
    try { handle.setPointerCapture(ev.pointerId); } catch (_) {}
    handle.addEventListener('pointermove', onPointerMove);
    handle.addEventListener('pointerup', onPointerUp);
    handle.addEventListener('pointercancel', onPointerUp);
  }

  handle.addEventListener('pointerdown', onPointerDown);
})();
</script>

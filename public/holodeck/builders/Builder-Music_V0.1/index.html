//  RENDER: MOOD COLORS
// ═══════════════════════════════════════════════════════════════

function renderMoodColors() {
  const container = document.getElementById('mood-colors');
  const current = state.currentAsset?.payload?.mood_color || state.moodColor;

  container.innerHTML = MOOD_COLORS.map(m =>
    `<button class="key-btn ${m.color === current ? 'active' : ''}" data-color="${m.color}" style="display:flex;align-items:center;gap:4px;">
      <span style="width:10px;height:10px;border-radius:50%;background:${m.color};display:inline-block;"></span>
      ${m.name}
    </button>`
  ).join('');

  container.querySelectorAll('[data-color]').forEach(btn => {
    btn.addEventListener('click', () => {
      const color = btn.dataset.color;
      state.moodColor = color;
      if (state.currentAsset) state.currentAsset.payload.mood_color = color;
      updateClusterColors();
      renderMoodColors();
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  RENDER: LAYER LIST
// ═══════════════════════════════════════════════════════════════

function renderLayerList() {
  const container = document.getElementById('layer-list');
  const layers = state.currentAsset?.payload?.layers || [];

  if (layers.length === 0) {
    container.innerHTML = '<div style="color:var(--app-text-muted);font-size:12px;padding:8px 0;">No layers yet. Add a layer or use AI to generate.</div>';
    return;
  }

  const iconMap = {
    'keys': '🎹', 'piano': '🎹', 'synth': '🎹', 'lead': '🎹', 'melody': '🎵',
    'drums': '🥁', 'beat': '🥁', 'percussion': '🥁', 'perc': '🥁',
    'bass': '🎸', 'sub': '🎸',
    'pad': '🌊', 'ambient': '🌊', 'atmosphere': '🌊',
    'fx': '✨', 'effects': '✨',
    'voice': '🎤', 'vocal': '🎤',
  };

  container.innerHTML = layers.map((layer, i) => {
    const name = layer.name || `Layer ${i + 1}`;
    const nameLower = name.toLowerCase();
    let icon = '🎵';
    for (const [key, emoji] of Object.entries(iconMap)) {
      if (nameLower.includes(key)) { icon = emoji; break; }
    }
    return `
      <div class="layer-item" data-index="${i}">
        <div class="layer-icon">${icon}</div>
        <div class="layer-info">
          <div class="layer-name">${esc(name)}</div>
          <div class="layer-pattern">${esc(layer.pattern || '—')}</div>
        </div>
        <div class="layer-gain">
          <input type="range" min="0" max="1" step="0.05" value="${layer.gain ?? 0.5}" data-index="${i}">
        </div>
        <div class="layer-actions">
          <button class="delete-layer" data-index="${i}" title="Remove">✕</button>
        </div>
      </div>`;
  }).join('');

  // Gain sliders
  container.querySelectorAll('input[type="range"]').forEach(slider => {
    slider.addEventListener('input', () => {
      const idx = parseInt(slider.dataset.index);
      if (state.currentAsset?.payload?.layers[idx]) {
        state.currentAsset.payload.layers[idx].gain = parseFloat(slider.value);
      }
    });
  });

  // Delete buttons
  container.querySelectorAll('.delete-layer').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.index);
      if (state.currentAsset?.payload?.layers) {
        state.currentAsset.payload.layers.splice(idx, 1);
        renderLayerList();
      }
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  ITEM NAME ROW
// ═══════════════════════════════════════════════════════════════

function updateItemNameRow() {
  const nameEl = document.getElementById('item-name-display');
  const countEl = document.getElementById('item-element-count');
  const thumbEl = document.getElementById('item-mini-thumb');

  if (state.currentAsset) {
    nameEl.textContent = state.currentAsset.name || 'Untitled Theme';
    const layers = state.currentAsset.payload?.layers || [];
    countEl.textContent = `${layers.length} layer${layers.length !== 1 ? 's' : ''}`;
    // Render mini 3D thumbnail
    renderMiniThumb(thumbEl, state.currentAsset);
  } else {
    nameEl.textContent = 'No theme loaded';
    countEl.textContent = '';
    thumbEl.innerHTML = '';
    thumbEl.style.background = 'var(--app-surface)';
  }
}

/** Render a tiny 3D cluster into a target element, matching the gallery thumb style */
function renderMiniThumb(el, asset) {
  if (typeof THREE === 'undefined' || !asset) return;
  const color = asset.payload?.mood_color || '#3a7bd5';
  const layerCount = (asset.payload?.layers || []).length;
  const bpm = asset.payload?.bpm || 120;
  const SIZE = 56; // 2x for retina

  if (!_thumbRenderer) {
    _thumbRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    _thumbRenderer.setSize(SIZE, SIZE);
    _thumbRenderer.setPixelRatio(1);
  }

  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(50, 1, 0.1, 50);
  cam.position.set(2.5, 2, 3);
  cam.lookAt(0, 0, 0);
  sc.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(3, 4, 2);
  sc.add(dl);

  const col = new THREE.Color(color);
  sc.background = new THREE.Color(color).multiplyScalar(0.12);

  const geos = [
    new THREE.BoxGeometry(0.8, 0.8, 0.8),
    new THREE.OctahedronGeometry(0.55),
    new THREE.IcosahedronGeometry(0.55),
    new THREE.TorusGeometry(0.4, 0.18, 8, 16),
  ];
  const cGeo = geos[layerCount % geos.length];
  const cMat = new THREE.MeshStandardMaterial({
    color: col, emissive: col, emissiveIntensity: 0.3, metalness: 0.4, roughness: 0.5
  });
  const cMesh = new THREE.Mesh(cGeo, cMat);
  cMesh.rotation.set(bpm * 0.02, bpm * 0.03, 0);
  sc.add(cMesh);

  const orbCount = Math.min(layerCount + 2, 6);
  for (let i = 0; i < orbCount; i++) {
    const angle = (i / orbCount) * Math.PI * 2;
    const r = 1.0 + (i % 2) * 0.3;
    const sGeo = i % 3 === 0 ? new THREE.BoxGeometry(0.2, 0.2, 0.2)
      : i % 3 === 1 ? new THREE.OctahedronGeometry(0.15) : new THREE.SphereGeometry(0.12, 8, 8);
    const hsl = {}; col.getHSL(hsl);
    const oCol = new THREE.Color().setHSL((hsl.h + i * 0.08) % 1, hsl.s, hsl.l * 0.8);
    const sMat = new THREE.MeshStandardMaterial({
      color: oCol, emissive: oCol, emissiveIntensity: 0.2, metalness: 0.3, roughness: 0.6
    });
    const mesh = new THREE.Mesh(sGeo, sMat);
    mesh.position.set(Math.cos(angle) * r, Math.sin(angle * 0.5) * 0.4, Math.sin(angle) * r);
    mesh.rotation.set(angle, angle * 0.5, 0);
    sc.add(mesh);
  }

  _thumbRenderer.render(sc, cam);
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  canvas.getContext('2d').drawImage(_thumbRenderer.domElement, 0, 0);
  el.innerHTML = '';
  el.style.background = 'transparent';
  el.appendChild(canvas);
  cGeo.dispose(); cMat.dispose();
}

// ═══════════════════════════════════════════════════════════════
//  CLAUDE API INTEGRATION
// ═══════════════════════════════════════════════════════════════

const MUSIC_SYSTEM_PROMPT = `You are a music composition assistant for the Simbox music theme builder.
You generate music themes as JSON objects with Strudel.cc-style pattern notation.

When creating or modifying a music theme, return ONLY valid JSON (no markdown fences) with this structure:
{
  "name": "Theme Name",
  "description": "Brief description of the theme",
  "tags": ["tag1", "tag2"],
  "bpm": 120,
  "key": "C",
  "scale": "minor",
  "pattern": "stack(layer1, layer2, ...)",
  "layers": [
    {
      "name": "drums",
      "pattern": "s('bd sd bd sd, hh*8')",
      "gain": 0.5
    },
    {
      "name": "bass",
      "pattern": "s('bass').n('0 3 5 7')",
      "gain": 0.4
    },
    {
      "name": "keys",
      "pattern": "s('piano').n('0 2 4 7')",
      "gain": 0.6
    }
  ],
  "duration_behavior": "loop",
  "fade_in": 2.0,
  "fade_out": 3.0,
  "mood_color": "#3a7bd5"
}

Use Strudel.cc pattern syntax for the pattern fields. Layer names should describe the instrument role:
drums, bass, keys, lead, pad, ambient, fx, melody, chords, arpeggio, percussion, etc.

For mood_color, choose from: #3a7bd5 (calm), #e74c3c (energetic), #2c1654 (dark), #df7126 (warm),
#00c4be (cool), #9b59b6 (dreamy), #f1c40f (cheerful), #d95763 (tense).

Keep patterns musically coherent with the specified key and scale. Use 2-5 layers for variety.
Common BPM ranges: ambient 60-80, lofi 70-90, pop 100-130, electronic 120-140, drum & bass 160-180.`;

async function callClaude(userPrompt, mode) {
  if (!state.apiKey) {
    promptForApiKey();
    return null;
  }

  const messages = [];

  if (mode === 'modify' && state.currentAsset) {
    messages.push({
      role: 'user',
      content: `Here is the current music theme JSON:\n${JSON.stringify(state.currentAsset.payload, null, 2)}\n\nModify it based on this request: ${userPrompt}\n\nReturn the updated theme as a complete JSON object.`
    });
  } else {
    messages.push({
      role: 'user',
      content: `Create a new music theme based on this description: ${userPrompt}\n\nReturn a complete theme JSON object.`
    });
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 4096,
        system: MUSIC_SYSTEM_PROMPT,
        messages,
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API error ${res.status}: ${err}`);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    return parseAIResponse(text);
  } catch (e) {
    console.error('Claude API error:', e);
    toast(`AI error: ${e.message}`);
    return null;
  }
}

function parseAIResponse(text) {
  // Strip markdown code fences if present
  let json = text;
  const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceMatch) json = fenceMatch[1];

  // Try to find JSON object
  const start = json.indexOf('{');
  const end = json.lastIndexOf('}');
  if (start !== -1 && end > start) {
    json = json.substring(start, end + 1);
  }

  try {
    return JSON.parse(json);
  } catch (e) {
    console.error('Failed to parse AI response:', e, json);
    toast('Failed to parse AI response');
    return null;
  }
}

function applyAIResult(result) {
  if (!result) return;

  if (state.isCreateMode || !state.currentAsset) {
    // Create new asset
    const asset = createBlankAsset();
    Object.assign(asset.payload, {
      description: result.description || '',
      bpm: result.bpm || 120,
      key: result.key || 'C',
      scale: result.scale || 'minor',
      pattern: result.pattern || '',
      layers: result.layers || [],
      duration_behavior: result.duration_behavior || 'loop',
      fade_in: result.fade_in ?? 2,
      fade_out: result.fade_out ?? 3,
      mood_color: result.mood_color || '#3a7bd5',
    });
    asset.name = result.name || 'AI Theme';
    asset.tags = result.tags || [];
    state.currentAsset = asset;
  } else {
    // Modify existing
    const p = state.currentAsset.payload;
    if (result.name) state.currentAsset.name = result.name;
    if (result.tags) state.currentAsset.tags = result.tags;
    if (result.description) p.description = result.description;
    if (result.bpm) p.bpm = result.bpm;
    if (result.key) p.key = result.key;
    if (result.scale) p.scale = result.scale;
    if (result.pattern) p.pattern = result.pattern;
    if (result.layers) p.layers = result.layers;
    if (result.duration_behavior) p.duration_behavior = result.duration_behavior;
    if (result.fade_in != null) p.fade_in = result.fade_in;
    if (result.fade_out != null) p.fade_out = result.fade_out;
    if (result.mood_color) p.mood_color = result.mood_color;
  }

  state.moodColor = state.currentAsset.payload.mood_color || '#3a7bd5';
  updateClusterColors();
  updateItemNameRow();
  updateTransportUI();
  saveCurrentAsset();

  if (state.mode === 'editing') {
    syncFieldsFromAsset();
  }

  toast(state.isCreateMode ? 'New theme created!' : 'Theme updated!');

  // Exit create mode
  if (state.isCreateMode) {
    toggleCreateMode(false);
  }
}

async function sendPrompt() {
  const input = document.getElementById('prompt-input');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('btn-send');
  btn.classList.add('generating');
  input.disabled = true;

  const mode = state.isCreateMode ? 'create' : 'modify';
  const result = await callClaude(text, mode);
  applyAIResult(result);

  btn.classList.remove('generating');
  input.disabled = false;
  input.value = '';
  input.focus();
}

function toggleCreateMode(force) {
  state.isCreateMode = force ?? !state.isCreateMode;
  const toggle = document.getElementById('btn-new-toggle');
  const input = document.getElementById('prompt-input');

  if (state.isCreateMode) {
    toggle.classList.add('active');
    input.placeholder = 'Describe a new music theme to create…';
    document.body.classList.add('create-mode');
  } else {
    toggle.classList.remove('active');
    input.placeholder = 'Describe a change…';
    document.body.classList.remove('create-mode');
  }
}

function promptForApiKey() {
  const key = prompt('Enter your Anthropic API key:', state.apiKey);
  if (key !== null) {
    state.apiKey = key.trim();
    localStorage.setItem('musicbox_api_key', state.apiKey);
    toast(state.apiKey ? 'API key saved' : 'API key cleared');
  }
}

// ═══════════════════════════════════════════════════════════════
//  BATCH IMPORT
// ═══════════════════════════════════════════════════════════════

async function autoImportBatchMusic() {
  try {
    const res = await fetch('./assets/music/manifest.json');
    if (!res.ok) return;
    const manifest = await res.json();

    // Build map of existing assets so we can overwrite templates but skip user edits
    const existing = {};
    for (const a of await dbGetAll()) existing[a.id] = a;
    let imported = 0;

    const categories = manifest.categories || {};
    for (const [catId, cat] of Object.entries(categories)) {
      for (const file of (cat.files || [])) {
        try {
          const r = await fetch(`./assets/music/${catId}/${file}`);
          if (!r.ok) continue;
          const asset = await r.json();
          if (!asset.id) continue;
          const ex = existing[asset.id];
          // Import if new, or overwrite if it's still a template (not user-edited)
          if (!ex || ex.meta?.origin === 'template') {
            await dbSave(asset);
            imported++;
          }
        } catch {}
      }
    }

    if (imported > 0) {
      console.log(`MusicBox: imported ${imported} batch music themes`);
      if (state.mode === 'browse') loadGallery();
    }
  } catch {}
}

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════════════════════════

function wireEvents() {
  // Cancel — back-navigation matching PropBox:
  // search → browse, editing → browse (revert), browse → closed
  document.getElementById('btn-cancel').addEventListener('click', () => {
    if (state.mode === 'search') {
      searchQuery = '';
      document.getElementById('search-input').value = '';
      setState('browse');
    } else if (state.mode === 'editing') {
      if (state.preEditSnapshot) {
        state.currentAsset = deepClone(state.preEditSnapshot);
        state.preEditSnapshot = null;
      }
      setState('browse');
    } else {
      setState('closed');
    }
  });

  document.getElementById('btn-done').addEventListener('click', async () => {
    syncFieldsToAsset();
    await saveCurrentAsset();
    state.preEditSnapshot = null;
    // Go to browse after saving, so user can see their library
    setState('browse');
    toast('Theme saved!');
  });

  // Edit button on stage (below the 3D viewport)
  document.getElementById('btn-edit-stage').addEventListener('click', () => {
    if (!state.currentAsset) {
      // No theme loaded — open browse instead
      setState('browse');
      return;
    }
    state.preEditSnapshot = deepClone(state.currentAsset);
    setState('editing');
  });

  // Hamburger menu — simple toggle: opens browse, closes browse
  document.getElementById('btn-hamburger').addEventListener('click', (e) => {
    e.stopPropagation();
    if (state.mode === 'closed') {
      setState('browse');
    } else {
      setState('closed');
    }
  });

  // Search button in browse header → switch to search state
  document.getElementById('btn-search').addEventListener('click', () => {
    setState('search');
  });

  // ⋯ More actions menu in panel header
  const moreMenu = document.getElementById('panel-more-menu');
  document.getElementById('btn-panel-more').addEventListener('click', (e) => {
    e.stopPropagation();
    moreMenu.classList.toggle('open');
  });
  document.addEventListener('click', () => moreMenu.classList.remove('open'));

  // Menu items
  document.getElementById('menu-new').addEventListener('click', () => {
    moreMenu.classList.remove('open');
    const asset = createBlankAsset();
    state.currentAsset = asset;
    state.preEditSnapshot = deepClone(asset);
    saveCurrentAsset().then(() => setState('editing'));
  });

  document.getElementById('menu-duplicate').addEventListener('click', async () => {
    moreMenu.classList.remove('open');
    if (!state.currentAsset) return;
    const dup = deepClone(state.currentAsset);
    dup.id = uuid();
    dup.name += ' (copy)';
    dup.meta.created = new Date().toISOString();
    dup.meta.modified = new Date().toISOString();
    dup.meta.origin = 'user';
    dup.meta.origin_ref = state.currentAsset.id;
    state.currentAsset = dup;
    await saveCurrentAsset();
    toast('Duplicated!');
    updateItemNameRow();
  });

  document.getElementById('menu-export').addEventListener('click', () => {
    moreMenu.classList.remove('open');
    if (!state.currentAsset) return;
    const blob = new Blob([JSON.stringify(state.currentAsset, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${state.currentAsset.name.replace(/\s+/g, '_')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported!');
  });

  document.getElementById('menu-import').addEventListener('click', () => {
    moreMenu.classList.remove('open');
    document.getElementById('file-import').click();
  });

  document.getElementById('file-import').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const asset = JSON.parse(text);
      if (!asset.id) asset.id = uuid();
      asset.meta = asset.meta || {};
      asset.meta.modified = new Date().toISOString();
      await dbSave(asset);
      state.currentAsset = asset;
      toast('Imported!');
      updateItemNameRow();
      if (state.mode === 'browse') loadGallery();
    } catch (err) {
      toast('Import failed: invalid JSON');
    }
    e.target.value = '';
  });

  document.getElementById('menu-apikey').addEventListener('click', () => {
    moreMenu.classList.remove('open');
    promptForApiKey();
  });

  document.getElementById('menu-delete').addEventListener('click', async () => {
    moreMenu.classList.remove('open');
    if (!state.currentAsset) return;
    if (!confirm('Delete this theme?')) return;
    await dbDelete(state.currentAsset.id);
    state.currentAsset = null;
    toast('Theme deleted');
    updateItemNameRow();
    setState('closed');
  });

  // Gallery browsing — click detection that ignores drag/orbit gestures
  {
    let _vpDown = null;
    const vp = document.getElementById('viewport');
    vp.addEventListener('pointerdown', (e) => {
      _vpDown = { x: e.clientX, y: e.clientY, t: Date.now() };
    });
    vp.addEventListener('pointerup', (e) => {
      if (!_vpDown) return;
      const dx = e.clientX - _vpDown.x;
      const dy = e.clientY - _vpDown.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const dt = Date.now() - _vpDown.t;
      _vpDown = null;
      if (dist > 8 || dt > 400) return; // was a drag or long-press, not a click
      if (state.mode === 'closed') {
        setState('browse');
      }
    });
    vp.addEventListener('dblclick', () => {
      if (state.mode === 'browse' && state.currentAsset) {
        state.preEditSnapshot = deepClone(state.currentAsset);
        setState('editing');
      }
    });
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      const tab = document.getElementById(`tab-${btn.dataset.tab}`);
      if (tab) tab.classList.add('active');
    });
  });

  // Search — live filter
  document.getElementById('search-input').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderGallery();
  });
  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchQuery = '';
      e.target.value = '';
      setState('browse');
    }
  });

  // Category
  document.getElementById('gallery-category-select').addEventListener('change', (e) => {
    activeCategory = e.target.value;
    renderGallery();
  });

  // BPM slider
  document.getElementById('bpm-slider').addEventListener('input', (e) => {
    document.getElementById('bpm-val').textContent = e.target.value;
    if (state.currentAsset) state.currentAsset.payload.bpm = parseInt(e.target.value);
    updateTransportUI();
  });

  // Fade sliders
  document.getElementById('fade-in-slider').addEventListener('input', (e) => {
    document.getElementById('fade-in-val').textContent = parseFloat(e.target.value).toFixed(1);
  });
  document.getElementById('fade-out-slider').addEventListener('input', (e) => {
    document.getElementById('fade-out-val').textContent = parseFloat(e.target.value).toFixed(1);
  });

  // Delete theme button in settings
  document.getElementById('btn-delete-theme').addEventListener('click', async () => {
    if (!state.currentAsset) return;
    if (!confirm('Delete this theme?')) return;
    await dbDelete(state.currentAsset.id);
    state.currentAsset = null;
    stopPlayback();
    toast('Theme deleted');
    setState('closed');
    updateItemNameRow();
  });

  // Add layer button
  document.getElementById('btn-add-layer').addEventListener('click', () => {
    if (!state.currentAsset) return;
    if (!state.currentAsset.payload.layers) state.currentAsset.payload.layers = [];
    state.currentAsset.payload.layers.push({
      name: `Layer ${state.currentAsset.payload.layers.length + 1}`,
      pattern: "s('sine').n('0 2 4 7')",
      gain: 0.5,
    });
    renderLayerList();
  });

  // Prompt bar
  document.getElementById('btn-new-toggle').addEventListener('click', () => toggleCreateMode());

  document.getElementById('prompt-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendPrompt();
    }
  });

  document.getElementById('btn-send').addEventListener('click', sendPrompt);

  // Transport
  document.getElementById('btn-play').addEventListener('click', () => {
    if (state.isPlaying) {
      stopPlayback();
    } else {
      startPlayback();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

    if (e.key === ' ') {
      e.preventDefault();
      if (state.isPlaying) stopPlayback();
      else startPlayback();
    }
    if (e.key === 'Escape') {
      document.getElementById('btn-cancel').click();
    }
    if (e.key === 'b' || e.key === 'B') {
      if (state.mode === 'closed') setState('browse');
    }
    if (e.key === 'f' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      if (state.mode === 'browse') setState('search');
    }

    // Arrow up/down: step through gallery with live preview (PropBox pattern)
    const isArrow = (e.key === 'ArrowUp' || e.key === 'ArrowDown');
    if (isArrow && (state.mode === 'browse' || state.mode === 'search') && galleryDisplayedAssets.length > 0) {
      e.preventDefault();
      const currentIdx = galleryDisplayedAssets.findIndex(a => a.id === state.currentAsset?.id);
      let nextIdx;
      if (e.key === 'ArrowDown') {
        nextIdx = currentIdx < 0 ? 0 : Math.min(currentIdx + 1, galleryDisplayedAssets.length - 1);
      } else {
        nextIdx = currentIdx <= 0 ? 0 : currentIdx - 1;
      }
      const asset = galleryDisplayedAssets[nextIdx];
      // loadAsset calls renderGallery which rebuilds DOM with correct .active class
      loadAsset(asset.id).then(() => {
        // After DOM is rebuilt, scroll the active item into view
        const card = document.querySelector(`.gallery-item[data-id="${asset.id}"]`);
        if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      });
    }
  });

  // File field live sync
  ['field-name', 'field-desc', 'field-tags'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      if (state.mode === 'editing') syncFieldsToAsset();
      if (id === 'field-name') {
        document.getElementById('panel-title').textContent = document.getElementById('field-name').value || 'Edit';
        updateItemNameRow();
      }
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

async function init() {
  await openDB();
  initThree();
  wireEvents();

  // Load system prompt if available
  try {
    const res = await fetch('./assets/system-prompt.md');
    if (res.ok) state.systemPrompt = await res.text();
  } catch {}

  // Load most recent asset
  const all = await dbGetAll();
  if (all.length > 0) {
    state.currentAsset = all[0];
    state.moodColor = all[0].payload?.mood_color || '#3a7bd5';
    updateClusterColors();
    updateItemNameRow();
    updateTransportUI();
  }

  // Background batch import
  autoImportBatchMusic();

  // Set initial tab
  document.getElementById('tab-file').classList.add('active');
}

init();
